<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Before Fades Static Web Visual Novel Engine</title>
  <style>
    :root {
      --ui-bg: rgba(8, 10, 14, 0.82);
      --ui-bg-strong: rgba(8, 10, 14, 0.94);
      --ui-border: rgba(255, 255, 255, 0.18);
      --ui-panel: rgba(4, 6, 9, 0.72);
      --text: #f4f1ea;
      --muted: rgba(244, 241, 234, 0.72);
      --accent: #aeb4bd;
      --accent-2: #d8b36a;
      --danger: #df6b6b;
      --speaker-default: #d8b36a;
      --speaker-tingru: #e7b84a;
      --speaker-jami: #82a8ff;
      --speaker-system: #c8c8c8;
      --shadow: rgba(0, 0, 0, 0.55);
      --focus-glow: rgba(180, 188, 200, 0.16);
      --font: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
      --top-safe: 70px;
      --hud-height: 286px;
      --hud-gap: 22px;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #050609;
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
      user-select: none;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #050609;
      --ui-bg: rgba(8, 10, 14, 0.82);
      --ui-bg-strong: rgba(8, 10, 14, 0.94);
      --ui-border: rgba(255, 255, 255, 0.18);
      --ui-panel: rgba(4, 6, 9, 0.72);
      --accent: #aeb4bd;
      --accent-soft: rgba(174, 180, 189, 0.18);
      --focus-glow: rgba(180, 188, 200, 0.16);
    }

    /*
      UI 焦點色，不等於說話者。
      g / gray / oldnoodle / laomian / kait / lei / system：灰色系
      t / tingru：庭如共感、庭如操作段落，暖黃色
      j / jami / stage：傑米台上表演段，冷藍色
    */
    #game.theme-gray {
      --ui-bg: rgba(9, 11, 15, 0.82);
      --ui-bg-strong: rgba(8, 10, 14, 0.94);
      --ui-border: rgba(205, 213, 224, 0.22);
      --ui-panel: rgba(8, 10, 14, 0.76);
      --accent: #b6bcc6;
      --accent-soft: rgba(182, 188, 198, 0.18);
      --focus-glow: rgba(182, 188, 198, 0.15);
    }

    #game.theme-tingru {
      --ui-bg: rgba(24, 18, 6, 0.82);
      --ui-bg-strong: rgba(30, 22, 7, 0.94);
      --ui-border: rgba(244, 199, 86, 0.34);
      --ui-panel: rgba(33, 24, 8, 0.76);
      --accent: #f1c85f;
      --accent-soft: rgba(241, 200, 95, 0.20);
      --focus-glow: rgba(241, 188, 76, 0.20);
    }

    #game.theme-jami {
      --ui-bg: rgba(5, 12, 28, 0.84);
      --ui-bg-strong: rgba(4, 10, 24, 0.95);
      --ui-border: rgba(108, 160, 255, 0.34);
      --ui-panel: rgba(6, 14, 31, 0.78);
      --accent: #82a8ff;
      --accent-soft: rgba(108, 160, 255, 0.20);
      --focus-glow: rgba(82, 138, 255, 0.22);
    }

    #bgLayer, #spriteLayer, #effectLayer, #uiLayer {
      position: absolute;
      inset: 0;
    }

    #bgLayer {
      background: radial-gradient(circle at 50% 30%, #202530 0%, #080a0e 65%, #020305 100%);
      background-size: cover;
      background-position: center;
      transition: opacity 480ms ease, filter 420ms ease, transform 520ms ease;
      z-index: 1;
      overflow: hidden;
    }

    #bgMediaFrame {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      transition: inset 260ms ease, border-color 260ms ease, background 260ms ease, box-shadow 260ms ease, border-radius 260ms ease;
      pointer-events: none;
    }

    #bgImage {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0;
      transition: opacity 360ms ease, transform 520ms ease, filter 360ms ease;
      pointer-events: none;
      user-select: none;
    }

    #bgLayer.display-cover #bgMediaFrame {
      top: 10px;
      right: clamp(36px, 5vw, 92px);
      bottom: calc(var(--hud-height) - 6px);
      left: clamp(36px, 5vw, 92px);
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      overflow: hidden;
    }

    #bgLayer.display-cover #bgImage {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: scale(1.2);
      filter: drop-shadow(0 16px 30px rgba(0,0,0,0.46));
      -webkit-mask-image: none;
      mask-image: none;
    }

    #bgLayer.display-cg #bgMediaFrame {
      top: var(--top-safe);
      right: 0;
      bottom: calc(var(--hud-height) + var(--hud-gap));
      left: 0;
      border: 0;
      border-radius: 0;
      background: rgba(0,0,0,0.10);
      box-shadow: none;
      overflow: hidden;
    }

    #bgLayer.display-cg #bgImage {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: scale(1.065);
      filter: drop-shadow(0 18px 34px rgba(0,0,0,0.48));
      -webkit-mask-image: none;
      mask-image: none;
    }

    #game.title-screen #bgLayer.display-cover #bgMediaFrame {
      inset: 0;
      right: 0;
      bottom: 0;
      left: 0;
      top: 0;
      background: transparent;
      overflow: hidden;
    }

    #game.title-screen #bgLayer.display-cover #bgImage {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center;
      filter: none;
      transform: scale(1);
    }

    /*
      doc_ 圖片不再作為主背景顯示；正常流程會轉到右下角 UI 縮圖。
      這裡只保留 display-document 的保護樣式，避免舊資料意外把文件塞回主舞台。
    */
    #bgLayer.display-document #bgMediaFrame {
      display: none;
    }

    #bgLayer.display-logo #bgMediaFrame {
      top: var(--top-safe);
      right: clamp(28px, 4.2vw, 76px);
      bottom: calc(var(--hud-height) + var(--hud-gap));
      left: clamp(28px, 4.2vw, 76px);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 24px;
      background: transparent;
      box-shadow: none;
      overflow: hidden;
      backdrop-filter: blur(2px);
    }

    #bgLayer.display-logo #bgImage {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: scale(0.985);
      filter: drop-shadow(0 20px 36px rgba(0,0,0,0.56));
    }

    #titleLogo {
      position: absolute;
      left: 60%;
      top: clamp(30px, 10vh, 30px);
      width: min(750px, 75vw);
      max-height: 45vh;
      object-fit: contain;
      transform: translateX(-40%) translateY(-20px);
      opacity: 0;
      z-index: 4;
      filter: drop-shadow(0 18px 28px rgba(0,0,0,0.72));
      transition: opacity 420ms ease, transform 420ms ease;
      pointer-events: none;
    }

    #titleLogo.visible {
      opacity: 0.94;
      transform: translateX(-50%) translateY(0);
    }

    #bgLayer::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.08), rgba(0,0,0,0.46));
      pointer-events: none;
      z-index: 2;
      opacity: 1;
      transition: opacity 900ms ease;
    }
	
	#bgLayer::before {
	  content: "";
	  position: absolute;
	  inset: 0;
	  background: #000;
	  opacity: var(--final-bg-black-opacity, 0);
	  transition: opacity var(--final-bg-black-ms, 700ms) ease;
	  pointer-events: none;
	  z-index: 3;
	}

    #game.title-screen #bgLayer::after {
      background: linear-gradient(to bottom, rgba(0,0,0,0.08), rgba(0,0,0,0.34));
    }

    #game.theme-tingru #bgLayer::after {
      background: linear-gradient(to bottom, rgba(0,0,0,0.08), rgba(23,15,3,0.52));
    }

    #game.theme-jami #bgLayer::after {
      background: linear-gradient(to bottom, rgba(0,0,0,0.10), rgba(3,9,24,0.54));
    }

    #spriteLayer {
      z-index: 2;
      pointer-events: none;
    }

    .sprite {
      position: absolute;
      bottom: calc(var(--hud-height) - 8px);
      max-height: calc(100vh - var(--hud-height) - 58px);
      max-width: 38vw;
      object-fit: contain;
      filter: drop-shadow(0 24px 38px rgba(0,0,0,0.58));
      opacity: 0;
      transform: translateY(12px) scale(0.985);
      transition: opacity 360ms ease, transform 700ms ease, filter 360ms ease, left 700ms ease;
    }

    .sprite.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .sprite.left { left: clamp(18px, 4.8vw, 82px); right: auto; }
    .sprite.center { left: 50%; right: auto; transform: translateX(-50%) translateY(12px) scale(0.985); }
    .sprite.center.visible { transform: translateX(-50%) translateY(0) scale(1); }
    .sprite.right { left: calc(100vw - clamp(18px, 4.8vw, 82px)); right: auto; transform: translateX(-100%) translateY(12px) scale(0.985); }
    .sprite.right.visible { transform: translateX(-100%) translateY(0) scale(1); }

    .sprite.dimmed {
      filter: grayscale(0.5) brightness(0.32) drop-shadow(0 24px 38px rgba(0,0,0,0.58));
    }

    #effectLayer {
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    #effectLayer.blackout { background: #000; }

    #cutinLayer {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--top-safe) 0 calc(var(--hud-height) + var(--hud-gap));
      opacity: 0;
      transform: scale(0.985);
      transition: opacity 420ms ease, transform 520ms ease;
      pointer-events: none;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    #cutinLayer.visible {
      opacity: 0.88;
      transform: scale(1);
    }

    #cutinImage {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 0;
      box-shadow: 0 28px 84px rgba(0,0,0,0.66);
    }

    #game.empathy-fullscreen-active #bgLayer,
    #game.empathy-fullscreen-active #spriteLayer,
    #game.empathy-fullscreen-active #uiLayer,
    #game.empathy-fullscreen-active #choices {
      visibility: hidden;
    }

    #game.empathy-fullscreen-active #effectLayer {
      z-index: 20;
      pointer-events: auto;
      background: #000;
    }

    #game.empathy-fullscreen-active #cutinLayer {
      inset: 0;
      padding: 0;
      opacity: 0;
      transform: scale(1);
      background-image: none !important;
      transition: opacity var(--cutin-fade-ms, 300ms) ease;
    }

    #game.empathy-fullscreen-active #cutinLayer.visible {
      opacity: 1;
      transform: scale(1);
    }

    #game.empathy-fullscreen-active #cutinImage {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      box-shadow: none;
    }

    #effectLayer.input-lock {
      z-index: 11;
      pointer-events: auto;
      cursor: default;
    }

    #flash {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      pointer-events: none;
    }

    .emotion-word {
      position: absolute;
      z-index: 8;
      padding: 6px 10px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      background: rgba(6, 9, 14, 0.64);
      color: rgba(255, 239, 196, 0.92);
      font-size: clamp(15px, 1.65vw, 25px);
      letter-spacing: 0.12em;
      text-shadow: 0 0 14px rgba(241, 200, 95, 0.85);
      animation: emotionFloatUp var(--emotion-life, 5800ms) ease forwards;
      pointer-events: none;
      white-space: nowrap;
      will-change: opacity, transform, filter;
    }

    /*
      庭如共感文字特效：
      - float-up：原本的上升效果，適合一般感知、浮現、意識上浮。
      - float-down：新增的下墜效果，適合負面情緒、沉重感、墜落、壓迫。
    */
    .emotion-word.float-up {
      color: rgba(255, 239, 196, 0.92);
      border-color: rgba(255, 236, 186, 0.18);
      background: rgba(6, 9, 14, 0.56);
      text-shadow: 0 0 14px rgba(241, 200, 95, 0.85);
      animation-name: emotionFloatUp;
    }

    .emotion-word.float-down {
      color: rgba(198, 226, 255, 0.95);
      border-color: rgba(116, 176, 255, 0.34);
      background: rgba(4, 12, 28, 0.68);
      text-shadow: 0 0 16px rgba(89, 162, 255, 0.88), 0 0 30px rgba(23, 64, 155, 0.66);
      animation-name: emotionFloatDown;
    }

    @keyframes emotionFloatUp {
      0% { opacity: 0; transform: translateY(12px) scale(0.96); filter: blur(6px); }
      18% { opacity: 1; filter: blur(0); }
      78% { opacity: 0.92; }
      100% { opacity: 0; transform: translateY(-52px) scale(1.06); filter: blur(2px); }
    }

    @keyframes emotionFloatDown {
      0% { opacity: 0; transform: translateY(-18px) scale(1.03); filter: blur(7px); }
      18% { opacity: 1; filter: blur(0); }
      62% { opacity: 0.88; transform: translateY(22px) scale(0.98); filter: blur(0.5px); }
      100% { opacity: 0; transform: translateY(82px) scale(0.90); filter: blur(3px); }
    }

    #uiLayer {
      z-index: 4;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
    }

    #topBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      pointer-events: none;
    }

    #modeBadge {
      min-width: 210px;
      padding: 10px 16px;
      border: 1px solid var(--ui-border);
      border-radius: 999px;
      background: rgba(0,0,0,0.42);
      color: var(--accent);
      font-size: 14px;
      letter-spacing: 0.08em;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 26px var(--focus-glow);
      transition: color 240ms ease, border-color 240ms ease, box-shadow 240ms ease;
    }

    #mainHud {
      display: grid;
      grid-template-columns: minmax(0, 1fr) clamp(340px, 31vw, 460px);
      gap: 18px;
      align-items: end;
      height: var(--hud-height);
      padding: 0 24px 24px;
      pointer-events: none;
    }

    #dialogueBox {
      height: 262px;
      min-height: 0;
      max-height: 262px;
      padding: 22px 28px 24px;
      border: 1px solid var(--ui-border);
      border-radius: 22px;
      background: linear-gradient(180deg, var(--ui-bg), var(--ui-bg-strong));
      box-shadow: 0 18px 45px var(--shadow), 0 0 34px var(--focus-glow);
      backdrop-filter: blur(12px);
      pointer-events: auto;
      cursor: pointer;
      position: relative;
      transition: background 240ms ease, border-color 240ms ease, box-shadow 240ms ease;
    }

    #speakerName {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      margin-bottom: 12px;
      padding: 5px 15px;
      border-radius: 999px;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.10);
      color: var(--speaker-default);
      font-size: clamp(20px, 1.9vw, 28px);
      font-weight: 850;
      letter-spacing: 0.075em;
      line-height: 1.25;
      text-shadow: 0 2px 12px rgba(0,0,0,0.55);
    }

    #speakerName.oldnoodle,
    #speakerName.laomian,
    #speakerName.kate,
    #speakerName.lei { color: var(--speaker-default); }
    #speakerName.tingru { color: var(--speaker-tingru); }
    #speakerName.jami { color: var(--speaker-jami); }
    #speakerName.system { color: var(--speaker-system); }
    #speakerName.narrator { color: rgba(255,255,255,0.82); }

    #dialogueText {
      height: 154px;
      min-height: 0;
      color: var(--text);
      font-size: clamp(18px, 1.85vw, 25px);
      line-height: 1.86;
      letter-spacing: 0.035em;
      white-space: pre-wrap;
      overflow-y: auto;
      padding-right: 8px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.55);
    }

    #nextIndicator {
      position: absolute;
      right: 22px;
      bottom: 14px;
      color: var(--accent);
      font-size: 17px;
      animation: blink 900ms ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.3; transform: translateY(0); }
      50% { opacity: 0.95; transform: translateY(3px); }
    }

    #sidePanel {
      height: 262px;
      min-height: 0;
      max-height: 262px;
      padding: 20px 22px;
      border: 1px solid var(--ui-border);
      border-radius: 20px;
      background: var(--ui-panel);
      box-shadow: 0 18px 45px var(--shadow), 0 0 28px var(--focus-glow);
      backdrop-filter: blur(12px);
      pointer-events: auto;
      overflow: hidden;
      transition: background 240ms ease, border-color 240ms ease, box-shadow 240ms ease;
    }

    #sidePanel.has-document {
      border-color: color-mix(in srgb, var(--accent) 48%, rgba(255,255,255,0.18));
    }

    #sideImageWrap {
      float: right;
      width: min(142px, 38%);
      height: 74px;
      margin: 0 0 10px 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 13px;
      overflow: hidden;
      background: rgba(0,0,0,0.24);
      box-shadow: 0 8px 22px rgba(0,0,0,0.36);
    }

    #sideImageWrap.doc-thumb {
      cursor: zoom-in;
      position: relative;
      border-color: color-mix(in srgb, var(--accent) 42%, rgba(255,255,255,0.16));
      background: rgba(255,255,255,0.07);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    #sideImageWrap.doc-thumb:hover,
    #sideImageWrap.doc-thumb:focus-visible {
      transform: translateY(-1px);
      border-color: var(--accent);
      box-shadow: 0 10px 28px rgba(0,0,0,0.46), 0 0 18px var(--focus-glow);
      outline: none;
    }

    #sideImageWrap.doc-thumb::after {
      content: "點擊放大";
      position: absolute;
      right: 6px;
      bottom: 5px;
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(0,0,0,0.66);
      color: rgba(255,255,255,0.86);
      font-size: 11px;
      letter-spacing: 0.06em;
      pointer-events: none;
    }

    #sideImage {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      background: rgba(0,0,0,0.18);
    }

    #sideTitle {
      color: var(--accent);
      font-size: clamp(15px, 1.25vw, 18px);
      font-weight: 800;
      letter-spacing: 0.13em;
      margin-bottom: 12px;
      line-height: 1.35;
    }

    #sideContent {
      color: rgba(255,255,255,0.86);
      font-size: clamp(16px, 1.25vw, 19px);
      line-height: 1.78;
      white-space: pre-wrap;
      max-height: 168px;
      overflow: auto;
      padding-right: 4px;
    }

    #sideContent::-webkit-scrollbar { width: 8px; }
    #sideContent::-webkit-scrollbar-thumb { background: var(--accent-soft); border-radius: 999px; }

    #choices {
      position: absolute;
      left: 50%;
      bottom: calc(var(--hud-height) + 20px);
      width: min(740px, calc(100vw - 48px));
      transform: translateX(-50%);
      z-index: 5;
      display: none;
      flex-direction: column;
      gap: 14px;
      pointer-events: auto;
    }

    .choice-btn {
      width: 100%;
      padding: 16px 22px;
      border: 1px solid var(--ui-border);
      border-radius: 16px;
      background: rgba(9, 12, 17, 0.90);
      color: var(--text);
      font-size: clamp(19px, 1.75vw, 25px);
      font-weight: 740;
      line-height: 1.55;
      text-align: center;
      cursor: pointer;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.38);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    #choices.title-choice-mode {
      width: min(630px, calc(100vw - 48px));
    }

    #choices.title-choice-mode .choice-btn {
      padding: 18px 22px;
      font-size: clamp(21px, 2vw, 28px);
      font-weight: 760;
      line-height: 1.6;
    }

    #game.title-screen #uiLayer {
      display: none;
    }

    #game.title-screen.title-await-click #choices {
      display: none !important;
    }

    #game.title-screen #choices.title-choice-mode {
      bottom: clamp(72px, 12vh, 150px);
      z-index: 8;
    }

    #game.final-ending-active #uiLayer,
    #game.final-ending-active #choices {
      opacity: 0;
      pointer-events: none;
    }

    #game.final-ending-active #bgLayer {
      z-index: 12;
      background: transparent !important;
    }

    #game.final-ending-active #bgMediaFrame {
      opacity: 0;
      visibility: hidden;
    }

    #game.final-ending-active #bgLayer::after {
      opacity: 0;
    }

    #game.final-ending-active #titleLogo {
      left: 50%;
      top: 50%;
      z-index: 30;
      opacity: 0.96;
      transform: translateX(-50%) translateY(-50%);
      transition: left 1600ms ease, top 1600ms ease, opacity 1200ms ease, transform 1600ms ease;
    }

    .choice-btn:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      background: var(--ui-bg-strong);
    }

    #docViewerLayer {
      position: absolute;
      inset: 0;
      z-index: 12;
      display: none;
      align-items: center;
      justify-content: center;
      padding: clamp(18px, 4vw, 54px);
      background: rgba(0,0,0,0.78);
      backdrop-filter: blur(10px);
      pointer-events: auto;
    }

    #docViewerLayer.visible {
      display: flex;
    }

    #docViewerFrame {
      position: relative;
      width: min(1180px, 92vw);
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: clamp(12px, 1.6vw, 20px);
      border: 1px solid rgba(255,255,255,0.20);
      border-radius: 24px;
      background: rgba(8, 10, 14, 0.92);
      box-shadow: 0 34px 110px rgba(0,0,0,0.78), 0 0 36px var(--focus-glow);
    }

    #docViewerImage {
      max-width: 100%;
      max-height: min(78vh, 820px);
      object-fit: contain;
      border-radius: 16px;
      background: rgba(0,0,0,0.28);
      box-shadow: 0 18px 60px rgba(0,0,0,0.62);
    }

    #docViewerCaption {
      width: 100%;
      color: rgba(255,255,255,0.78);
      font-size: clamp(13px, 1.1vw, 16px);
      line-height: 1.55;
      text-align: center;
      letter-spacing: 0.04em;
    }

    #docViewerClose {
      position: absolute;
      top: -14px;
      right: -14px;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 999px;
      background: rgba(5, 6, 9, 0.94);
      color: rgba(255,255,255,0.92);
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 10px 28px rgba(0,0,0,0.58);
    }

    #docViewerClose:hover,
    #docViewerClose:focus-visible {
      color: #fff;
      border-color: var(--accent);
      outline: none;
    }


    #loadingLayer {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(20px, 4vw, 56px);
      background:
        radial-gradient(circle at 50% 28%, rgba(82, 92, 118, 0.24), transparent 38%),
        linear-gradient(180deg, rgba(5,6,9,0.96), rgba(2,3,5,0.98));
      color: var(--text);
      pointer-events: auto;
      opacity: 1;
      visibility: visible;
      transition: opacity 420ms ease, visibility 420ms ease;
    }

    #loadingLayer.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #loadingCard {
      width: min(680px, calc(100vw - 36px));
      padding: clamp(24px, 4vw, 42px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(12,15,21,0.88), rgba(6,8,12,0.94));
      box-shadow: 0 34px 110px rgba(0,0,0,0.72), inset 0 0 34px rgba(255,255,255,0.035);
      backdrop-filter: blur(14px);
      text-align: center;
    }

    #loadingTitle {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 54px);
      font-weight: 850;
      letter-spacing: 0.08em;
      line-height: 1.08;
      text-shadow: 0 16px 34px rgba(0,0,0,0.68);
    }

    #loadingSubtitle {
      margin: 0 0 28px;
      color: rgba(244,241,234,0.74);
      font-size: clamp(15px, 1.55vw, 19px);
      line-height: 1.75;
      letter-spacing: 0.05em;
    }

    #loadingProgressTrack {
      position: relative;
      width: 100%;
      height: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      box-shadow: inset 0 0 18px rgba(0,0,0,0.42);
    }

    #loadingProgressBar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(216,179,106,0.72), rgba(130,168,255,0.84));
      box-shadow: 0 0 22px rgba(216,179,106,0.28);
      transition: width 180ms ease;
    }

    #loadingPercent {
      margin-top: 14px;
      color: rgba(255,255,255,0.92);
      font-size: clamp(20px, 2.8vw, 30px);
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    #loadingStatus,
    #loadingStats,
    #loadingCurrent {
      margin-top: 10px;
      color: rgba(244,241,234,0.74);
      font-size: clamp(13px, 1.25vw, 16px);
      line-height: 1.65;
      letter-spacing: 0.035em;
      word-break: break-all;
    }

    #loadingCurrent {
      min-height: 1.65em;
      color: rgba(244,241,234,0.58);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    #loadingErrors {
      display: none;
      max-height: 140px;
      margin-top: 16px;
      padding: 12px 14px;
      overflow: auto;
      border: 1px solid rgba(223,107,107,0.28);
      border-radius: 14px;
      background: rgba(54, 13, 15, 0.34);
      color: rgba(255,214,214,0.9);
      font-size: 13px;
      line-height: 1.55;
      text-align: left;
      white-space: pre-wrap;
    }

    #loadingLayer.has-errors #loadingErrors {
      display: block;
    }

    .hidden { display: none !important; }

    .shake { animation: shake 420ms cubic-bezier(.36,.07,.19,.97) both; }

    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }

    @media (max-width: 980px) {
      #mainHud {
        grid-template-columns: 1fr minmax(300px, 35vw);
        gap: 14px;
        padding: 0 16px 16px;
      }
      #sidePanel { padding: 16px 18px; }
      #sideContent { font-size: 16px; }
    }

    @media (max-width: 820px) {
      :root { --top-safe: 56px; --hud-height: 236px; --hud-gap: 12px; }
      #topBar { padding: 10px 12px; }
      #modeBadge { min-width: auto; max-width: 52vw; font-size: 12px; padding: 8px 12px; }
      #mainHud {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 0 12px 12px;
      }
      #sidePanel { display: none; }
      #dialogueBox { height: 214px; min-height: 0; max-height: 214px; padding: 15px 18px 18px; }
      #speakerName { font-size: 20px; min-height: 31px; margin-bottom: 10px; }
      #dialogueText { height: 126px; font-size: 18px; line-height: 1.72; }
      #choices { bottom: calc(var(--hud-height) + 12px); width: min(94vw, 680px); }
      .choice-btn { font-size: 18px; padding: 13px 16px; }
      #choices.title-choice-mode { width: min(92vw, 560px); }
      #choices.title-choice-mode .choice-btn { font-size: 20px; padding: 14px 16px; }
      .sprite { bottom: calc(var(--hud-height) - 12px); max-height: calc(100vh - var(--hud-height) - 48px); max-width: 56vw; }
      .sprite.left { left: -3vw; right: auto; }
      .sprite.right { right: -3vw; left: auto; }
      #bgLayer.display-cover #bgMediaFrame,
      #bgLayer.display-cg #bgMediaFrame,
      #bgLayer.display-logo #bgMediaFrame {
        right: 0;
        left: 0;
        border-radius: 0;
      }
      #bgLayer.display-cover #bgMediaFrame {
        top: calc(var(--top-safe) - 6px);
        bottom: calc(var(--hud-height) - 4px);
      }
      #game.title-screen #bgLayer.display-cover #bgMediaFrame {
        inset: 0;
      }
      #cutinLayer {
        right: 0;
        left: 0;
        border-radius: 0;
      }
      #sidePanel.has-document {
        display: block;
        position: absolute;
        right: 12px;
        bottom: calc(var(--hud-height) + 10px);
        width: min(260px, calc(100vw - 24px));
        height: auto;
        max-height: 138px;
        padding: 12px;
        z-index: 6;
      }
      #sidePanel.has-document #sideTitle,
      #sidePanel.has-document #sideContent {
        display: none;
      }
      #sidePanel.has-document #sideImageWrap {
        float: none;
        width: 100%;
        height: 104px;
        margin: 0;
      }
      #docViewerClose {
        top: 8px;
        right: 8px;
      }
    }
  </style>
</head>
<body>
  <div id="game" class="theme-gray">
    <div id="bgLayer" class="display-cover">
      <div id="bgMediaFrame">
        <img id="bgImage" alt="" draggable="false" />
      </div>
      <img id="titleLogo" alt="" draggable="false" />
    </div>
    <div id="spriteLayer"></div>
    <div id="effectLayer">
      <div id="cutinLayer"><img id="cutinImage" alt="" draggable="false" /></div>
      <div id="flash"></div>
    </div>

    <div id="uiLayer">
      <div id="topBar">
        <div id="modeBadge">SYSTEM / WAITING</div>
      </div>

      <div id="mainHud">
        <div id="dialogueBox" role="button" aria-label="advance dialogue">
          <div id="speakerName" class="narrator">旁白</div>
          <div id="dialogueText"></div>
          <div id="nextIndicator">▼</div>
        </div>
        <div id="sidePanel">
          <div id="sideTitle">CASE / NOTE</div>
          <div id="sideImageWrap" class="hidden"><img id="sideImage" alt="" draggable="false" /></div>
          <div id="sideContent">等待腳本載入……</div>
        </div>
      </div>
    </div>

    <div id="choices"></div>

    <div id="docViewerLayer" aria-hidden="true">
      <div id="docViewerFrame" role="dialog" aria-modal="true" aria-label="文件放大檢視">
        <button id="docViewerClose" type="button" aria-label="關閉文件檢視">×</button>
        <img id="docViewerImage" alt="" draggable="false" />
        <div id="docViewerCaption"></div>
      </div>
    </div>


    <div id="loadingLayer" aria-live="polite" aria-busy="true">
      <div id="loadingCard">
        <h1 id="loadingTitle">Before Fades</h1>
        <p id="loadingSubtitle">正在整理最後一場演出的燈光、人物與記憶……</p>
        <div id="loadingProgressTrack" aria-hidden="true"><div id="loadingProgressBar"></div></div>
        <div id="loadingPercent">0%</div>
        <div id="loadingStatus">讀取劇本中……</div>
        <div id="loadingCurrent"></div>
        <div id="loadingStats">0 / 0</div>
        <div id="loadingErrors"></div>
      </div>
    </div>
  </div>

  <script>
    "use strict";

    /***********************************************************************
     * Before Fades Static Web Visual Novel Engine
     * ---------------------------------------------------------------------
     * 使用方式：
     * 1. 將本檔命名為 index.html。
     * 2. 建立 data/script.json。
     * 3. 建立 assets/images、assets/bgm、assets/sfx。
     * 4. 上傳整個資料夾到 GitHub Pages、Netlify、Cloudflare Pages 等靜態網頁空間。
     * 5. 玩家打開網址即可遊玩，不需要安裝 Python、Java、Node.js 或任何執行環境。
     *
     * 新增：焦點 UI 指令。
     *   { "type": "ui", "v": "g" }  灰色：老麵、凱特、雷老師、系統旁白等一般焦點
     *   { "type": "ui", "v": "t" }  暖黃色：庭如操作／共感焦點
     *   { "type": "ui", "v": "j" }  冷藍色：傑米台上表演焦點
     * 也可以掛在任一指令上：{ "type": "say", "ui": "t", "speaker": "庭如", "text": "..." }
     *
     * 共感文字特效：
     *   { "type": "effect", "name": "empathy", "words": ["期待"] }       原上升效果
     *   { "type": "effect", "name": "empathyUp", "words": ["期待"] }     明確上升
     *   { "type": "effect", "name": "empathyDown", "words": ["恐懼"] }  新增下墜
     *   { "type": "effect", "name": "empathy", "direction": "down", "words": ["恐懼"] }  同樣下墜
     ***********************************************************************/

    const CONFIG = {
      scriptPath: "./data/script.json",
      textSpeed: 26,
      bgmFadeMs: 900,
      bgPostSwitchDelayMs: 680,
      emotionWordLifeMs: 5800,
      emotionWordStaggerMs: 150,
      imagePreloadConcurrency: 8,
      imagePreloadTimeoutMs: 15000,
      keepPreloadedImageRefs: true,
      defaultBg: "radial-gradient(circle at 50% 30%, #202530 0%, #080a0e 65%, #020305 100%)"
    };

    const $ = (id) => document.getElementById(id);

    const dom = {
      game: $("game"),
      uiLayer: $("uiLayer"),
      bg: $("bgLayer"),
      bgImage: $("bgImage"),
      bgMediaFrame: $("bgMediaFrame"),
      titleLogo: $("titleLogo"),
      sprites: $("spriteLayer"),
      effects: $("effectLayer"),
      cutinLayer: $("cutinLayer"),
      cutinImage: $("cutinImage"),
      flash: $("flash"),
      modeBadge: $("modeBadge"),
      speaker: $("speakerName"),
      text: $("dialogueText"),
      dialogueBox: $("dialogueBox"),
      next: $("nextIndicator"),
      choices: $("choices"),
      sidePanel: $("sidePanel"),
      sideTitle: $("sideTitle"),
      sideContent: $("sideContent"),
      sideImageWrap: $("sideImageWrap"),
      sideImage: $("sideImage"),
      docViewer: $("docViewerLayer"),
      docViewerImage: $("docViewerImage"),
      docViewerCaption: $("docViewerCaption"),
      docViewerClose: $("docViewerClose"),
      loading: $("loadingLayer"),
      loadingProgressBar: $("loadingProgressBar"),
      loadingPercent: $("loadingPercent"),
      loadingStatus: $("loadingStatus"),
      loadingCurrent: $("loadingCurrent"),
      loadingStats: $("loadingStats"),
      loadingErrors: $("loadingErrors")
    };

    const state = {
      script: null,
      sceneId: "start",
      index: 0,
      flags: {},
      busy: false,
      typing: false,
      fullText: "",
      typeTimer: null,
      awaitingChoice: false,
      startedAudio: false,
      currentBgmId: null,
      currentMode: "system",
      currentSceneMode: "system",
      currentConversation: null,
      currentBgId: "",
      currentDocId: "",
      currentUi: "g",
      currentChoiceUi: null,
      pendingAfterTextActions: [],
      continueAfterBusy: false,
      bgmToken: 0,
      spriteZ: 20,
      sprites: new Map(),
      dialogueLayout: { primaryId: "", secondaryId: "", swappedOnce: false },
      pendingSpriteMoveMs: 0,
      awaitingTitleChoiceClick: false,
      titleChoiceRevealed: false,
      inputLocked: false,
      preloadedImages: new Map(),
      preloadReport: null
    };

    const audio = {
      bgm: new Audio(),
      bgmNext: null,
      ambience: new Audio(),
      sfxPool: []
    };

    audio.bgm.loop = true;
    audio.bgm.volume = 0;
    audio.ambience.loop = true;
    audio.ambience.volume = 0.35;

    const EMPTY_SCRIPT = {
      meta: {
        title: "Before Fadeout Static Web Visual Novel Engine",
        version: "engine-only"
      },
      assets: {
        backgrounds: {},
        characters: {},
        bgm: {},
        ambience: {},
        sfx: {}
      },
      scenes: {
        start: [
          { "type": "ui", "v": "g", "label": "SYSTEM / NO SCRIPT" },
          { "type": "note", "title": "SCRIPT NOT FOUND", "text": "找不到 data/script.json。\n請建立劇情腳本檔案後重新整理頁面。" },
          { "type": "narrate", "text": "找不到 data/script.json。這個 index.html 是純遊戲引擎，不包含正式劇情。" },
          { "type": "end" }
        ]
      }
    };

    async function init() {
      bindEvents();
      showLoadingScreen("讀取劇本中……", 0, 0);
      state.script = await loadScript();
      state.preloadReport = await preloadAllImagesWithProgress();
      validateScene(state.sceneId);
      applyFocusUi("g", "SYSTEM / READY");
      setSideNote("SYSTEM", `腳本載入完成：${state.script.meta?.title || "Untitled"}\n圖片素材：${state.preloadReport.ok}/${state.preloadReport.total} 已載入，失敗 ${state.preloadReport.failed}。\n按一下文字框或按 Enter / Space 推進。`);
      hideLoadingScreen();
      await wait(260);
      await runCurrent();
    }

    async function loadScript() {
      try {
        const res = await fetch(CONFIG.scriptPath, { cache: "no-cache" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } catch (err) {
        console.warn("無法載入 data/script.json。index.html 不內建正式劇情，將顯示缺少腳本提示。", err);
        return EMPTY_SCRIPT;
      }
    }

    function bindEvents() {
      dom.game.addEventListener("click", (e) => {
        if (revealPendingTitleChoice()) {
          e.preventDefault();
          e.stopPropagation();
        }
      });
      dom.dialogueBox.addEventListener("click", () => advance());
      document.addEventListener("keydown", (e) => {
        if (state.inputLocked) {
          e.preventDefault();
          return;
        }
        if (isDocumentViewerOpen()) {
          if (["Escape", "Enter", " "].includes(e.key)) {
            e.preventDefault();
            hideDocumentViewer();
          }
          return;
        }
        if (["Enter", " "].includes(e.key)) {
          e.preventDefault();
          if (!revealPendingTitleChoice()) advance();
        }
      });
      dom.sideImageWrap.addEventListener("click", openSideDocument);
      dom.sideImageWrap.addEventListener("keydown", (e) => {
        if (["Enter", " "].includes(e.key)) {
          e.preventDefault();
          openSideDocument();
        }
      });
      dom.docViewerClose.addEventListener("click", hideDocumentViewer);
      dom.docViewer.addEventListener("click", (e) => { if (e.target === dom.docViewer) hideDocumentViewer(); });

      ["click", "keydown", "touchstart"].forEach((eventName) => {
        document.addEventListener(eventName, unlockAudio, { once: true });
      });
    }

    function unlockAudio() {
      state.startedAudio = true;
      [audio.bgm, audio.ambience].forEach(a => {
        a.play().then(() => a.pause()).catch(() => {});
      });
    }

    async function runCurrent() {
      if (state.busy || state.awaitingChoice) return;
      const scene = getScene();
      if (!scene[state.index]) return;
      state.busy = true;
      const cmd = scene[state.index];
      try {
        await execute(cmd);
      } catch (err) {
        console.error("Command error:", cmd, err);
        await showText("系統", `腳本指令執行錯誤：${cmd.type || "unknown"}\n${err.message}`, "system");
      } finally {
        state.busy = false;
        if (state.continueAfterBusy && !state.awaitingChoice && !state.typing) {
          state.continueAfterBusy = false;
          runCurrent();
        }
      }
    }

    async function execute(cmd = {}) {
      applyDirectingContext(cmd);

      if (cmd.ui || cmd.focus) {
        applyFocusUi(cmd.ui || cmd.focus, cmd.label);
      }

      switch (cmd.type) {
        case "say":
          await showText(cmd.speaker || "", cmd.text || "", classifySpeaker(cmd.speaker), cmd);
          break;
        case "narrate":
          if (shouldSuppressInitialTitleUi(cmd)) nextCommand();
          else await showText("旁白", cmd.text || "", "narrator", cmd);
          break;
        case "ui":
        case "focus":
          applyFocusUi(cmd.v || cmd.value || cmd.focus || cmd.ui || "g", cmd.label || cmd.l);
          nextCommand();
          break;
        case "mode":
          setMode(cmd.value || cmd.v || "system", cmd.label || cmd.l || cmd.value || cmd.v || "SYSTEM", cmd);
          nextCommand();
          break;
        case "bg":
          await setBackground(cmd);
          nextCommand();
          break;
        case "show":
          await showSprite(cmd);
          nextCommand();
          break;
        case "hide":
          await hideSprite(cmd.id);
          nextCommand();
          break;
        case "clearSprites":
          clearSprites();
          nextCommand();
          break;
        case "bgm":
          await playBgm(cmd.id, cmd.volume, cmd.loop, cmd.fade);
          nextCommand();
          break;
        case "sfx":
          playSfx(cmd.id, cmd.volume);
          nextCommand();
          break;
        case "effect":
          await runEffect(cmd);
          nextCommand();
          break;
        case "wait":
          await wait(cmd.ms || 500);
          nextCommand();
          break;
        case "choice":
          await showChoice(cmd);
          break;
        case "jump":
          jumpTo(cmd.next);
          break;
        case "if":
          handleIf(cmd);
          break;
        case "note":
          if (shouldSuppressInitialTitleUi(cmd)) {
            nextCommand();
          } else {
            setSideNote(cmd.title || "NOTE", cmd.text || "");
            nextCommand();
          }
          break;
        case "end":
          await endGame();
          break;
        default:
          console.warn("Unknown command:", cmd);
          nextCommand();
      }
    }

    function advance() {
      if (state.inputLocked || state.awaitingChoice || isDocumentViewerOpen()) return;
      unlockAudio();
      if (state.typing) {
        finishTyping();
        return;
      }
      if (!state.busy) nextCommand();
    }

    function nextCommand() {
      processPendingAfterTextActions();
      state.index += 1;
      if (state.busy) {
        state.continueAfterBusy = true;
        return;
      }
      runCurrent();
    }

    function getScene() {
      validateScene(state.sceneId);
      return state.script.scenes[state.sceneId];
    }

    function validateScene(id) {
      if (!state.script?.scenes?.[id]) throw new Error(`找不到場景：${id}`);
    }

    function jumpTo(sceneId) {
      validateScene(sceneId);
      state.sceneId = sceneId;
      state.index = 0;
      dom.choices.style.display = "none";
      dom.choices.innerHTML = "";
      dom.choices.classList.remove("title-choice-mode", "standard-choice-mode");
      state.awaitingChoice = false;
      state.awaitingTitleChoiceClick = false;
      state.titleChoiceRevealed = false;
      updateTitleScreenChrome();
      if (state.busy) {
        state.continueAfterBusy = true;
        return;
      }
      runCurrent();
    }

    function handleIf(cmd) {
      const actual = getFlag(cmd.flag);
      const match = ("equals" in cmd) ? actual === cmd.equals : Boolean(actual);
      const target = match ? cmd.then : cmd.else;
      if (target) jumpTo(target);
      else nextCommand();
    }

    function getFlag(path) { return state.flags[path]; }

    function applySet(values) {
      Object.entries(values).forEach(([key, value]) => { state.flags[key] = value; });
    }

    function clearDialogueUi() {
      clearInterval(state.typeTimer);
      state.typeTimer = null;
      state.typing = false;
      state.fullText = "";
      if (dom.speaker) {
        dom.speaker.textContent = "";
        dom.speaker.className = "narrator";
      }
      if (dom.text) dom.text.textContent = "";
      if (dom.next) dom.next.style.opacity = "0";
    }

    function shouldClearDialogueForEffect(cmd = {}) {
      const name = String(cmd.name || "").trim().toLowerCase();
      return [
        "empathy",
        "empathyup",
        "empathydown",
        "empathyfall",
        "empathysink",
        "fadeblack"
      ].includes(name) || cmd.hideUiDuringEffect === true;
    }

    async function showText(speaker, text, className, cmd = {}) {
      const shownCharacterId = await autoShowSpeakerSprite(speaker, text, cmd);
      queueAfterTextActions(cmd, shownCharacterId);
      dom.speaker.textContent = speaker || "旁白";
      dom.speaker.className = className || "narrator";
      dom.text.textContent = "";
      state.fullText = text || "";
      state.typing = true;
      dom.next.style.opacity = "0";

      let i = 0;
      clearInterval(state.typeTimer);
      state.typeTimer = setInterval(() => {
        i += 1;
        dom.text.textContent = state.fullText.slice(0, i);
        if (i >= state.fullText.length) finishTyping();
      }, CONFIG.textSpeed);
    }

    function finishTyping() {
      clearInterval(state.typeTimer);
      state.typeTimer = null;
      dom.text.textContent = state.fullText;
      state.typing = false;
      dom.next.style.opacity = "1";
    }

    function classifySpeaker(speaker) {
      if (!speaker) return "narrator";
      const s = String(speaker).trim().toLowerCase();
      if (["庭如", "tingru"].includes(s)) return "tingru";
      if (["傑米", "jami"].includes(s)) return "jami";
      if (["老麵", "老面", "oldnoodle", "laomian"].includes(s)) return "oldnoodle";
      if (["凱特", "kate"].includes(s)) return "kate";
      if (["雷老師", "老師", "lei"].includes(s)) return "lei";
      if (["系統", "system"].includes(s)) return "system";
      return "";
    }

    async function showChoice(cmd) {
      const isTitleChoice = isInitialTitleScene();
      const choiceUi = isTitleChoice ? { width: "title", textAlign: "center", fontScale: "title" } : (cmd.choiceUi || state.currentChoiceUi);
      applyChoiceUi(choiceUi);

      dom.choices.classList.toggle("title-choice-mode", isTitleChoice);
      dom.choices.classList.toggle("standard-choice-mode", !isTitleChoice);

      if (cmd.prompt && !isTitleChoice) {
        dom.speaker.textContent = "選擇";
        dom.speaker.className = "system";
        dom.text.textContent = cmd.prompt;
      }

      dom.choices.innerHTML = "";
      state.awaitingChoice = true;
      const rawOptions = Array.isArray(cmd.options) ? cmd.options : [];
      const options = isTitleChoice
        ? rawOptions.filter(option => String(option.text || "").includes("開始遊戲")).slice(0, 1)
        : rawOptions;

      options.forEach((option, idx) => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = option.text || `選項 ${idx + 1}`;
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          playSfx("ui_click", 0.35);
          if (option.ui || option.focus) applyFocusUi(option.ui || option.focus, option.label);
          applySet(option.set || {});
          dom.choices.style.display = "none";
          dom.choices.innerHTML = "";
          state.awaitingChoice = false;
          state.awaitingTitleChoiceClick = false;
          state.titleChoiceRevealed = false;
          dom.game.classList.remove("title-screen", "title-await-click");
          if (option.next) jumpTo(option.next);
          else nextCommand();
        });
        dom.choices.appendChild(btn);
      });

      if (isTitleChoice) {
        state.awaitingTitleChoiceClick = true;
        state.titleChoiceRevealed = false;
        dom.game.classList.add("title-screen", "title-await-click");
        dom.choices.style.display = "none";
      } else {
        state.awaitingTitleChoiceClick = false;
        dom.game.classList.remove("title-await-click");
        dom.choices.style.display = "flex";
      }
    }

    function revealPendingTitleChoice() {
      if (!state.awaitingTitleChoiceClick || state.titleChoiceRevealed) return false;
      state.titleChoiceRevealed = true;
      state.awaitingTitleChoiceClick = false;
      dom.game.classList.remove("title-await-click");
      dom.choices.style.display = "flex";
      return true;
    }

    function shouldSuppressInitialTitleUi(cmd = {}) {
      if (!isInitialTitleScene()) return false;
      return ["note", "narrate"].includes(String(cmd.type || ""));
    }

    function isInitialTitleScene() {
      return state.sceneId === "start" && String(state.currentSceneMode || "").toLowerCase() === "title";
    }

    function applyDirectingContext(cmd = {}) {
      if (!cmd || typeof cmd !== "object") return;

      if (cmd.sceneMode) setSceneMode(cmd.sceneMode);
      if (cmd.conversation) setConversationContext(cmd.conversation);
      if (cmd.choiceUi) state.currentChoiceUi = cmd.choiceUi;

      if (cmd.sceneMode && !cmd.ui && !cmd.focus && cmd.type !== "mode") {
        const focus = focusFromSceneMode(cmd.sceneMode);
        if (focus) {
          const current = dom.modeBadge?.dataset?.focus || "";
          if (focus !== current) applyFocusUi(focus, labelFromSceneMode(cmd.sceneMode));
        }
      }
    }

    function setSceneMode(sceneMode) {
      const next = String(sceneMode || "system").trim() || "system";
      if (state.currentSceneMode !== next) {
        state.currentSceneMode = next;
        dom.game.dataset.sceneMode = next;
        updateTitleScreenChrome();
      }
    }

    function updateTitleScreenChrome() {
      const active = isInitialTitleScene();
      dom.game.classList.toggle("title-screen", active);
      if (!active) dom.game.classList.remove("title-await-click");
    }

    function setConversationContext(conversation = {}) {
      if (!conversation || typeof conversation !== "object") return;

      const prevKey = state.currentConversation?._key || "";
      const normalized = {
        layout: conversation.layout || "auto",
        participants: Array.isArray(conversation.participants) ? [...conversation.participants] : [],
        voiceOnlyParticipants: Array.isArray(conversation.voiceOnlyParticipants) ? [...conversation.voiceOnlyParticipants] : [],
        placementPolicy: conversation.placementPolicy || "primary-left-secondary-right-swap-once",
        clearPolicy: conversation.clearPolicy || ""
      };
      normalized._key = JSON.stringify({
        layout: normalized.layout,
        participants: normalized.participants,
        voiceOnlyParticipants: normalized.voiceOnlyParticipants,
        placementPolicy: normalized.placementPolicy
      });

      state.currentConversation = normalized;

      if (normalized._key !== prevKey) {
        resetDialogueLayout();
        cleanupSpritesForConversation(normalized);
      }
    }

    function focusFromSceneMode(sceneMode) {
      const mode = String(sceneMode || "").toLowerCase();
      if (["empathy"].includes(mode)) return "t";
      if (["stage", "confession", "reincarnation"].includes(mode)) return "j";
      if (mode) return "g";
      return "";
    }

    function labelFromSceneMode(sceneMode) {
      const mode = String(sceneMode || "").toLowerCase();
      const labels = {
        title: "Before Fades",
        control: "老麵 / 後台控制",
        empathy: "庭如 / 共感模式",
        jamie_room: "老麵 / 傑米休息室",
        memory: "記憶 / 錄音",
        stage: "傑米 / 舞台",
        confession: "傑米 / 告白",
        reincarnation: "傑米 / 輪迴發表",
        afterward: "演出後 / 觀察",
        office: "三個月後 / 辦公室",
        report: "案件 / 封存"
      };
      return labels[mode] || String(sceneMode || "SYSTEM").toUpperCase();
    }

    function normalizeSpeakerFocus(value) {
      const v = String(value || "primary").trim().toLowerCase();
      if (["voice", "voiceonly", "offscreen", "none"].includes(v)) return "voice";
      if (["secondary", "right", "support"].includes(v)) return "secondary";
      if (["center", "solo", "monologue"].includes(v)) return "center";
      return "primary";
    }

    function normalizeDisplayMode(value) {
      const v = String(value || "background").trim().toLowerCase();
      if (["doc", "document", "sidepanel", "sidepanelexpandable"].includes(v)) return "document";
      if (["cg", "cutscene"].includes(v)) return "cg";
      if (["logo", "ui_or_publish"].includes(v)) return "logo";
      if (["color", "solid"].includes(v)) return "color";
      return "background";
    }

    function applyChoiceUi(choiceUi = {}) {
      const ui = choiceUi && typeof choiceUi === "object" ? choiceUi : {};
      dom.choices.style.width = "";
      dom.choices.style.textAlign = "";

      if (ui.width) {
        const width = String(ui.width).trim();
        if (width === "title") dom.choices.style.width = "min(630px, calc(100vw - 48px))";
        else if (width === "70%") dom.choices.style.width = "min(740px, calc(100vw - 48px))";
        else if (/^\d+%$/.test(width)) dom.choices.style.width = `min(${width}, calc(100vw - 48px))`;
        else dom.choices.style.width = width;
      }

      dom.choices.dataset.textAlign = ui.textAlign || "";
      dom.choices.dataset.fontScale = ui.fontScale || "";
    }

    function queueAfterTextActions(cmd = {}, shownCharacterId = "") {
      state.pendingAfterTextActions = [];
      if (cmd.leaveAfter && shownCharacterId) {
        state.pendingAfterTextActions.push({ type: "hide", id: shownCharacterId });
      }
    }

    function processPendingAfterTextActions() {
      const actions = state.pendingAfterTextActions || [];
      if (!actions.length) return;
      state.pendingAfterTextActions = [];
      actions.forEach(action => {
        if (action.type === "hide" && action.id) hideSprite(action.id);
      });
    }


    function normalizeFocus(value) {
      const v = String(value || "g").trim().toLowerCase();
      if (["t", "tingru", "warm", "yellow", "empathy"].includes(v)) return "t";
      if (["j", "jami", "stage", "blue", "cool"].includes(v)) return "j";
      return "g";
    }

    function focusLabel(focus) {
      if (focus === "t") return "TINGRU / EMPATHY";
      if (focus === "j") return "JAMI / STAGE";
      return "SYSTEM / CASE";
    }

    function applyFocusUi(value, label) {
      const focus = normalizeFocus(value);
      state.currentUi = focus;
      dom.game.classList.remove("theme-gray", "theme-tingru", "theme-jami");
      if (focus === "t") dom.game.classList.add("theme-tingru");
      else if (focus === "j") dom.game.classList.add("theme-jami");
      else dom.game.classList.add("theme-gray");
      dom.modeBadge.textContent = label || focusLabel(focus);
      dom.modeBadge.dataset.focus = focus;
    }

    function setMode(value, label, cmd = {}) {
      state.currentMode = value;
      if (cmd.sceneMode) setSceneMode(cmd.sceneMode);
      // 舊 JSON 若使用 mode，也盡量轉成焦點 UI，但不以 speaker 觸發。
      applyFocusUi(value, label || value || "SYSTEM");
      if (normalizeFocus(value) === "t") {
        dom.bg.style.filter = "saturate(0.86) brightness(0.90) contrast(1.05)";
      } else if (normalizeFocus(value) === "j") {
        dom.bg.style.filter = "saturate(0.78) brightness(0.86) contrast(1.10)";
      } else {
        dom.bg.style.filter = "";
      }
    }

    async function setBackground(cmdOrId, transition = "fade", postDelayMs = CONFIG.bgPostSwitchDelayMs) {
      const cmd = (cmdOrId && typeof cmdOrId === "object") ? cmdOrId : { id: cmdOrId, transition, waitAfter: postDelayMs };
      clearDialogueUi();
      let id = cmd.id || "";
      const requestedBgId = id;
      id = sanitizeBackgroundIdForScene(requestedBgId);
      const bg = state.script.assets?.backgrounds?.[id];

      if (!bg) {
        console.warn("Missing background:", id, requestedBgId && requestedBgId !== id ? `(requested: ${requestedBgId})` : "");
        dom.bg.style.background = CONFIG.defaultBg;
        dom.bgImage.removeAttribute("src");
        dom.bgImage.style.opacity = "0";
        updateTitleLogo("");
        await wait(normalizePostBgDelay(cmd.waitAfter ?? cmd.delayAfter ?? postDelayMs));
        return;
      }

      const src = typeof bg === "string" ? bg : (bg.src || "");
      const inferredCategory = src ? imageCategoryFor(id, src) : "background";
      const displayMode = normalizeDisplayMode(cmd.displayMode || imageDisplayModeFor(id, src, inferredCategory));
      const isDocument = displayMode === "document" || inferredCategory === "document" || cmd.documentTarget === "sidePanelExpandable";

      // doc_ / displayMode=document 不再切換主背景，只更新右下角 UI 縮圖，並保留目前舞台／房間背景。
      if (isDocument) {
        state.currentDocId = id || "";
        showDocumentInSidePanel(id, cmd);
        await wait(normalizePostBgDelay(cmd.waitAfter ?? cmd.delayAfter ?? postDelayMs));
        return;
      }

      state.currentBgId = id || "";
      state.currentDocId = "";
      setSideImage("");
      clearTransientSideNoteOnBackgroundChange(id);
      resetDialogueLayout();

      // 背景切換通常代表視覺焦點切換；先清掉不該跨場景殘留的舞台限定立繪，避免準備室或文件畫面誤出現台上傑米。
      clearInvalidSpritesForBackground(id);

      const actualTransition = cmd.transition ?? transition;
      if (actualTransition === "flash") await flash(0.78, 200);
      if (actualTransition === "fade") {
        dom.bg.style.opacity = "0";
        await wait(260);
      }

      dom.bg.classList.remove("display-cover", "display-cg", "display-document", "display-logo");

      if (bg.color || displayMode === "color") {
        dom.bg.classList.add("display-cover");
        dom.bg.style.background = bg.color || CONFIG.defaultBg;
        dom.bgImage.removeAttribute("src");
        dom.bgImage.style.opacity = "0";
        updateTitleLogo("");
      } else if (src) {
        const classMode = displayMode === "logo" ? "logo" : (displayMode === "cg" ? "cg" : "cover");
        dom.bg.classList.add(`display-${classMode}`);
        dom.bg.dataset.displayMode = displayMode;
        dom.bg.dataset.sceneMode = state.currentSceneMode || "";
        dom.bg.dataset.mainImageFit = cmd.mainImageFit || "";
        dom.bg.dataset.underlayFit = cmd.underlayFit || "";
        dom.bg.dataset.avoidUiOverlap = cmd.avoidUiOverlap === false ? "false" : "true";
        if (classMode === "cover") {
          // bg_ / background 圖只顯示在主舞台安全區，不再鋪成背後的大張底圖。
          dom.bg.style.backgroundImage = "none";
          dom.bg.style.background = CONFIG.defaultBg;
          dom.bg.style.backgroundSize = "cover";
          dom.bg.style.backgroundPosition = "center";
          dom.bg.style.backgroundRepeat = "no-repeat";
        } else {
          dom.bg.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.30), rgba(0,0,0,0.60)), url("${cssUrl(src)}")`;
          dom.bg.style.backgroundSize = "cover";
          dom.bg.style.backgroundPosition = "center";
          dom.bg.style.backgroundRepeat = "no-repeat";
        }
        dom.bgImage.style.opacity = "0";
        dom.bgImage.src = src;
        dom.bgImage.alt = assetDescriptionFor(id, src) || id || "background";
        await waitForImage(dom.bgImage);
        dom.bgImage.style.opacity = "1";
        updateTitleLogo(id);
      }

      dom.bg.style.opacity = "1";
      await wait(normalizePostBgDelay(cmd.waitAfter ?? cmd.delayAfter ?? postDelayMs));
    }

    function normalizePostBgDelay(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return CONFIG.bgPostSwitchDelayMs;
      return Math.max(0, n);
    }

    function sanitizeBackgroundIdForScene(id) {
      // 傑米錄音回憶段不要誤切到林薇 CG。保留 observe_linwei 那種正式觀察段的使用權。
      if (id === "cg_linwei_silent" && /^case_memory/i.test(String(state.sceneId || ""))) {
        return resolveBackgroundSrc("doc_voice_wave") ? "doc_voice_wave" : "case_file";
      }
      return id;
    }

    function clearInvalidSpritesForBackground(bgId) {
      const isStage = isStageBackground(bgId);
      state.sprites.forEach((img, id) => {
        const expression = String(img.dataset.expression || "");
        if (id === "jamie" && !isStage && ["show", "reincarnation"].includes(expression)) {
          img.remove();
          state.sprites.delete(id);
        }
      });
    }

    function isStageBackground(bgId = state.currentBgId) {
      const mode = String(state.currentSceneMode || "").toLowerCase();
      if (["stage", "confession", "reincarnation"].includes(mode)) return true;
      return /stage|show|confession|reincarnation|audience/.test(String(bgId || ""));
    }

    function imageDisplayModeFor(id, src, category) {
      if (category === "document") return "document";
      if (category === "cg") return "cg";
      if (category === "ui_or_publish" || /logo/i.test(id || src || "")) return "logo";
      return "background";
    }

    function imageCategoryFor(id, src) {
      const manifestMeta = imageMetaFor(id, src);
      if (manifestMeta?.category) return manifestMeta.category;
      const key = String(id || "").toLowerCase();
      const path = String(src || "").toLowerCase();
      if (key.startsWith("doc_") || path.includes("/doc_")) return "document";
      if (key.startsWith("cg_") || path.includes("/cg_")) return "cg";
      if (key.includes("logo") || path.includes("logo_")) return "ui_or_publish";
      return "background";
    }

    function imageMetaFor(id, src) {
      const manifest = state.script.assets?.imageManifest || {};
      if (id && manifest[id]) return manifest[id];
      if (src) {
        return Object.values(manifest).find(item => item?.src === src) || null;
      }
      return null;
    }

    function assetDescriptionFor(id, src) {
      return imageMetaFor(id, src)?.description || "";
    }

    function cssUrl(src) {
      return String(src || "").replace(/\\/g, "\\\\").replace(/"/g, '\\"');
    }

    function waitForImage(img) {
      if (!img || !img.src || img.complete) return Promise.resolve();
      return new Promise(resolve => {
        img.onload = () => resolve();
        img.onerror = () => resolve();
      });
    }

    function resolveBackgroundSrc(id) {
      const bg = state.script.assets?.backgrounds?.[id];
      if (!bg) return "";
      if (typeof bg === "string") return bg;
      return bg.src || "";
    }

    function updateTitleLogo(bgId) {
      const logo = resolveBackgroundSrc("logo_beforefades");
      if (!logo || !dom.titleLogo) {
        dom.titleLogo?.classList.remove("visible");
        return;
      }
      const shouldShow = ["title", "bg_title_mic_rose", "logo_beforefades"].includes(bgId);
      dom.titleLogo.alt = "";
      dom.titleLogo.onload = null;
      dom.titleLogo.onerror = null;
      dom.titleLogo.classList.remove("visible");
      if (!shouldShow) return;

      const showWhenLoaded = () => {
        if (dom.titleLogo.naturalWidth > 0) dom.titleLogo.classList.add("visible");
      };
      dom.titleLogo.onerror = () => dom.titleLogo.classList.remove("visible");
      dom.titleLogo.onload = showWhenLoaded;
      if (dom.titleLogo.src !== new URL(logo, window.location.href).href) dom.titleLogo.src = logo;
      else if (dom.titleLogo.complete) showWhenLoaded();
    }

    async function showSprite(cmd) {
      const id = cmd.id;
      if (!id || id === "none") return;
      if (Array.isArray(cmd.allowedSceneMode) && cmd.allowedSceneMode.length) {
        const allowed = cmd.allowedSceneMode.map(v => String(v).toLowerCase());
        if (!allowed.includes(String(state.currentSceneMode || "").toLowerCase())) {
          console.warn(`Skip sprite "${id}" because sceneMode "${state.currentSceneMode}" is not allowed.`, cmd);
          return;
        }
      }

      let img = state.sprites.get(id);
      if (!img) {
        img = document.createElement("img");
        img.className = "sprite";
        img.dataset.spriteId = id;
        dom.sprites.appendChild(img);
        state.sprites.set(id, img);
      }

      const requestedExpression = cmd.expression || img.dataset.expression || "default";
      const safeExpression = sanitizeCharacterExpression(id, requestedExpression);
      const src = resolveCharacterSrc(id, safeExpression, cmd.src);
      if (src && img.src !== new URL(src, window.location.href).href) img.src = src;
      img.dataset.auto = cmd.auto ? "true" : (img.dataset.auto || "false");
      img.dataset.expression = safeExpression;
      img.dataset.speakerFocus = cmd.speakerFocus || img.dataset.speakerFocus || "";
      img.dataset.presence = cmd.presence || img.dataset.presence || "onscreen";
      setSpritePosition(id, cmd.position || chooseDialogueSpritePosition(id, cmd));
      if (cmd.dimmed) img.classList.add("dimmed");
      bringSpriteToFront(id);
      if (cmd.instant) {
        requestAnimationFrame(() => img.classList.add("visible"));
        focusSprite(id);
        return;
      }
      await wait(30);
      img.classList.add("visible");
      focusSprite(id);
      await wait(260);
    }

    function setSpritePosition(id, position = "center") {
      const img = state.sprites.get(id);
      if (!img) return;
      const normalizedPosition = normalizeSpritePosition(id, position || "center");
      clearSpriteSlot(normalizedPosition, id);
      const visible = img.classList.contains("visible");
      const dimmed = img.classList.contains("dimmed");
      img.className = `sprite ${normalizedPosition || "center"}`;
      if (visible) img.classList.add("visible");
      if (dimmed) img.classList.add("dimmed");
      img.dataset.position = normalizedPosition || "center";
    }

    function normalizeSpritePosition(id, position = "center") {
      const mode = String(state.currentSceneMode || "").toLowerCase();
      const pos = String(position || "center").toLowerCase();
      if (mode === "jamie_room") {
        if (id === "jamie") return "left";
        if (id === "oldnoodle") return "right";
      }
      if (["stage", "confession", "reincarnation"].includes(mode)) {
        if (id === "jamie") return "center";
        if (pos === "center") return "left";
      }
      return ["left", "right", "center"].includes(pos) ? pos : "center";
    }

    function clearSpriteSlot(position, keepId = "") {
      const target = String(position || "center").toLowerCase();
      state.sprites.forEach((sprite, spriteId) => {
        if (spriteId === keepId) return;
        const spritePosition = String(sprite.dataset.position || "").toLowerCase();
        if (spritePosition !== target) return;
        // 舞台中間保留傑米；其他左右欄位視為單一角色槽，避免人物互相覆蓋。
        if (spriteId === "jamie" && target === "center" && isStageBackground()) return;
        sprite.remove();
        state.sprites.delete(spriteId);
      });
    }

    function sanitizeCharacterExpression(id, expression) {
      const exp = String(expression || "default");
      if (id === "jamie" && state.currentBgId === "stage_dark" && exp === "show") {
        return "nervous";
      }
      if (id === "jamie" && !isStageBackground() && ["show", "reincarnation"].includes(exp)) {
        return "nervous";
      }
      return exp;
    }

    function bringSpriteToFront(id) {
      const img = state.sprites.get(id);
      if (!img) return;
      state.spriteZ = (state.spriteZ || 20) + 1;
      img.style.zIndex = String(state.spriteZ);
    }

    async function hideSprite(id) {
      const img = state.sprites.get(id);
      if (!img) return;
      img.classList.remove("visible");
      await wait(260);
      img.remove();
      state.sprites.delete(id);
    }

    function clearSprites() {
      state.sprites.forEach(img => img.remove());
      state.sprites.clear();
      resetDialogueLayout();
    }

    function resolveCharacterSrc(id, expression, directSrc) {
      if (directSrc) return directSrc;
      const chars = state.script.assets?.characters || {};
      const char = chars[id];
      if (!char) return "";
      if (typeof char === "string") return char;
      if (expression && char[expression]) return char[expression];
      if (char.default) return char.default;
      return Object.values(char)[0] || "";
    }


    function speakerToCharacter(speaker) {
      const s = String(speaker || "").trim().toLowerCase();
      const map = {
        "老麵": "oldnoodle",
        "老面": "oldnoodle",
        "oldnoodle": "oldnoodle",
        "laomian": "oldnoodle",
        "庭如": "tingru",
        "tingru": "tingru",
        "傑米": "jamie",
        "jami": "jamie",
        "jamie": "jamie",
        "詹傑明": "jamie",
        "凱特": "kate",
        "kate": "kate",

    function cleanupSpritesForConversation(conversation = state.currentConversation) {
      const convo = conversation || {};
      const participants = Array.isArray(convo.participants) ? convo.participants : [];
      if (!participants.length) return;
      const allowed = new Set(participants.map(String));
      const sceneMode = String(state.currentSceneMode || "").toLowerCase();
      state.sprites.forEach((img, id) => {
        if (allowed.has(id)) return;
        // 舞台中間保留給傑米，若傑米正在舞台主位，不因工作人員對話被清掉。
        if (["stage", "confession", "reincarnation"].includes(sceneMode) && id === "jamie") return;

          img.remove();
          state.sprites.delete(id);

    async function autoShowSpeakerSprite(speaker, text, cmd = {}) {
      const mappedId = speakerToCharacter(speaker);
      const cmdCharacter = String(cmd.character || "").toLowerCase();
      const forceOnscreen = shouldForceOnscreenSpeaker(speaker, text, cmd);
      const id = forceOnscreen
        ? mappedId
        : ((cmdCharacter && cmdCharacter !== "none") ? cmd.character : mappedId);
      const presence = forceOnscreen ? "onscreen" : String(cmd.presence || "").toLowerCase();
      const speakerFocus = forceOnscreen ? "primary" : normalizeSpeakerFocus(cmd.speakerFocus);

      if (!id || id === "none") return "";
      if (!forceOnscreen && (speakerFocus === "voice" || presence === "voiceonly" || presence === "offscreen")) return "";
      if (isEmpathyFullscreenActive()) return "";

      cleanupSpritesForConversation();

      const forcedExpression = forceOnscreen && id === "jamie" ? "nervous" : "";
      const expression = sanitizeCharacterExpression(id, forcedExpression || cmd.expression || pickExpressionFor(id, text || ""));
      const position = cmd.position || (forceOnscreen && id === "jamie" ? "center" : chooseDialogueSpritePosition(id, { ...cmd, speakerFocus }));
      const src = resolveCharacterSrc(id, expression);
      if (!src) return "";

      const waitBeforeShow = state.pendingSpriteMoveMs || 0;
      state.pendingSpriteMoveMs = 0;
      if (waitBeforeShow > 0) await wait(waitBeforeShow);

      await showSprite({
        id,
        expression,
        position,
        auto: true,
        instant: true,
        speakerFocus: speakerFocus || cmd.speakerFocus || "primary",
        presence: presence || cmd.presence || "onscreen",
        allowedSceneMode: cmd.allowedSceneMode
      });
      return id;
    }

    function shouldForceOnscreenSpeaker(speaker, text, cmd = {}) {
      const id = speakerToCharacter(speaker);
      const t = String(text || "");
      if (id === "jamie" && /直接切|不要浪費眼淚|眼淚要在最有用/.test(t)) return true;
      return false;
    }

    function resetDialogueLayout() {
      state.dialogueLayout = { primaryId: "", secondaryId: "", swappedOnce: false };
      state.pendingSpriteMoveMs = 0;
    }

    function chooseDialogueSpritePosition(id, cmd = {}) {
      const focus = normalizeSpeakerFocus(cmd.speakerFocus);
      const conversation = state.currentConversation || {};
      const layoutType = String(conversation.layout || "").toLowerCase();
      const participants = Array.isArray(conversation.participants) ? conversation.participants : [];
      const sceneMode = String(state.currentSceneMode || "").toLowerCase();
      const isStageMode = ["stage", "confession", "reincarnation"].includes(sceneMode);
      const existing = state.sprites.get(id);

      if (cmd.position) return cmd.position;
      if (existing?.dataset?.position && !["center"].includes(existing.dataset.position)) return existing.dataset.position;

      // 舞台段中間保留給傑米；老麵、庭如、凱特、雷老師只能進左右兩端。
      if (isStageMode && id === "jamie") return "center";
      if (focus === "center" && !isStageMode) return "left";

      // 非舞台獨白也不要預設塞中間；除非是既有顯式 show 指令已經給了位置。
      if ((layoutType === "monologue" || (participants.length === 1 && participants[0] === id)) && !isStageMode) {
        return existing?.dataset?.position || "left";
      }

      const layout = state.dialogueLayout || (state.dialogueLayout = { primaryId: "", secondaryId: "", swappedOnce: false });

      if (!layout.primaryId || !state.sprites.has(layout.primaryId)) {
        layout.primaryId = id;
        layout.secondaryId = "";
        layout.swappedOnce = false;
        return "left";
      }

      if (id === layout.primaryId) return "left";
      if (id === layout.secondaryId) return "right";

      // 第一次換人主講時：不要再把原本左側人物「擠」到右邊。
      // 改成：原主講者先離場，新主講者進入原本左側位置；若原主講者之後再開口，才作為右側人物回來。
      if (focus === "primary" && !layout.swappedOnce) {
        const oldPrimary = layout.primaryId;
        layout.secondaryId = oldPrimary;
        layout.primaryId = id;
        layout.swappedOnce = true;
        state.pendingSpriteMoveMs = 0;
        const oldPrimarySprite = state.sprites.get(oldPrimary);
        if (oldPrimarySprite) {
          oldPrimarySprite.remove();
          state.sprites.delete(oldPrimary);
        }
        return "left";
      }

      if (layout.secondaryId && layout.secondaryId !== id) {
        const oldSecondary = state.sprites.get(layout.secondaryId);
        if (oldSecondary?.dataset?.auto === "true") {
          oldSecondary.remove();
          state.sprites.delete(layout.secondaryId);
        }
      }
      layout.secondaryId = id;
      return "right";
    }

    function pickExpressionFor(id, text) {
      const t = String(text || "");
      const bg = String(state.currentBgId || "");
      if (id === "oldnoodle") {
        if (/不知道|沒有立刻回答|現在需要相信|沉默|答案|孤單|放你走/.test(t)) return "silent";
        if (/確認|流程|精準|風險|不要改|提醒|今天吃藥|最難|要說|出事|燈|手還算穩|守門人/.test(t)) return "serious";
        return "default";
      }
      if (id === "tingru") {
        if (/沒事|如果出事|吞掉|太多|很重|洞|很冷/.test(t)) return "silent";
        if (normalizeFocus(state.currentUi) === "t" || /感覺|情緒|不是聲音|入口|前排|媒體區|高層|休息室|怕|悲傷|餓/.test(t)) return "empathy";
        if (/不對|不自然|很吵|懷疑|害怕|失控/.test(t)) return "uneasy";
        return "default";
      }
      if (id === "jamie") {
        const isStage = isStageBackground(bg);
        if (!isStage) return "nervous";
        if (/reincarnation|輪迴/.test(bg) || /升級|輪迴|產品|人格掃描|意志/.test(t)) return "reincarnation";
        if (/confession|告白/.test(bg) || /害怕|真心|死亡|忘記|坦承|不要笑/.test(t)) return "confession";
        if (/stage_show|showtime|audience_laugh/.test(bg) || /笑|地獄|台上|段子|觀眾/.test(t)) return "show";
        return "confession";
      }
      return "default";
    }

    async function playBgm(id, volume = 0.45, loop = true, fade = CONFIG.bgmFadeMs) {
      const src = state.script.assets?.bgm?.[id];
      if (!src) {
        console.warn("Missing BGM:", id);
        return;
      }
      if (state.currentBgmId === id && !audio.bgm.paused) return;

      state.currentBgmId = id;
      const token = ++state.bgmToken;
      const old = audio.bgm;
      const next = new Audio(src);
      next.loop = loop !== false;
      next.volume = 0;
      audio.bgmNext = next;

      safePlay(next);

      Promise.all([
        fadeOutAudio(old, fade),
        fadeInAudio(next, volume, fade)
      ]).then(() => {
        if (token !== state.bgmToken) {
          next.pause();
          return;
        }
        old.pause();
        audio.bgm = next;
        audio.bgmNext = null;
      });
    }

    async function playAmbience(id, volume = 0.35, loop = true) {
      const src = state.script.assets?.ambience?.[id];
      if (!src) return;
      audio.ambience.src = src;
      audio.ambience.loop = loop !== false;
      audio.ambience.volume = volume;
      safePlay(audio.ambience);

    function playSfx(id, volume = 0.6) {
      const sfxMap = state.script.assets?.sfx || {};
      const src = sfxMap[id] || (id === "click" ? sfxMap.ui_click : "");
      if (!src) return;
      const sfx = new Audio(src);
      sfx.volume = volume;
      audio.sfxPool.push(sfx);
      safePlay(sfx);
      sfx.addEventListener("ended", () => {
        audio.sfxPool = audio.sfxPool.filter(x => x !== sfx);
      });
    }

    function fadeInAudio(a, target, ms) {
      return new Promise((resolve) => {
        const start = performance.now();
        a.volume = 0;
        const tick = (now) => {
          const t = Math.min(1, (now - start) / Math.max(1, ms));
          a.volume = target * t;
          if (t < 1) requestAnimationFrame(tick);
          else resolve();
        };
        requestAnimationFrame(tick);
      });
    }

    function fadeOutAudio(a, ms) {
      return new Promise((resolve) => {
        const startVol = a.volume || 0;
        const start = performance.now();
        const tick = (now) => {
          const t = Math.min(1, (now - start) / Math.max(1, ms));
          a.volume = startVol * (1 - t);
          if (t < 1) requestAnimationFrame(tick);
          else resolve();
        };
        requestAnimationFrame(tick);
      });
    }

    async function runEffect(cmd) {
      if (shouldClearDialogueForEffect(cmd)) clearDialogueUi();
      switch (cmd.name) {
        case "shake": await shake(cmd.target || "game"); break;
        case "flash": await flash(cmd.opacity ?? 0.85, cmd.ms ?? 260); break;

        // 原本的庭如共感文字：上升。
        // JSON: { "type": "effect", "name": "empathy", "words": ["期待", "好奇"] }
        // 也可明確指定：{ "type": "effect", "name": "empathyUp", "words": [...] }
        case "empathy":
        case "empathyUp":
          await runEmpathyEffect(cmd);
          break;

        // 新增：負面情緒下墜。
        // JSON: { "type": "effect", "name": "empathyDown", "words": ["恐懼", "墜落"] }
        // 或：{ "type": "effect", "name": "empathy", "direction": "down", "words": [...] }
        case "empathyDown":
        case "empathyFall":
        case "empathySink":
          await runEmpathyEffect({ ...cmd, direction: cmd.direction || cmd.dir || "down" });
          break;

        case "fadeBlack": await fadeBlack(cmd.ms ?? 700, cmd); break;
        default: console.warn("Unknown effect:", cmd.name);
      }
    }

    async function runEmpathyEffect(cmdOrWords = [], direction = "up") {
      const cmd = Array.isArray(cmdOrWords) || typeof cmdOrWords === "string"
        ? { words: cmdOrWords, direction }
        : (cmdOrWords || {});
      const sourceWords = cmd.words || [];
      const words = expandEmotionWords(sourceWords, Number.isFinite(Number(cmd.wordMultiplier)) ? Number(cmd.wordMultiplier) : 3);
      const dir = normalizeEmotionDirection(cmd.direction || cmd.dir || direction || "up");
      const assetId = cmd.visualBg || (dir === "down" ? "cg_empathy_fall" : "cg_empathy_warm");
      const duration = Number.isFinite(Number(cmd.duration)) ? Number(cmd.duration) : estimateEmotionDuration(words);
      const shouldLock = cmd.lockInput !== false;
      const fadeInMs = Number.isFinite(Number(cmd.fadeInMs)) ? Number(cmd.fadeInMs) : 300;
      const holdBeforeWordsMs = Number.isFinite(Number(cmd.holdBeforeWordsMs)) ? Number(cmd.holdBeforeWordsMs) : 750;
      const fadeOutMs = 300;

      if (shouldLock) lockInput(true);
      enterEmpathyFullscreen();
      try {
        await showEmpathyBackdrop(assetId, fadeInMs);
        await wait(holdBeforeWordsMs);
        await empathyWords(words, dir, duration);
        await hideCutinImage(fadeOutMs);
      } finally {
        exitEmpathyFullscreen();
        if (shouldLock) lockInput(false);
      }
    }
