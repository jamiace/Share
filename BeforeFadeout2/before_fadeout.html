<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Before Fadeout: 最後一場售票演出</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: #050505;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            color: #eee;
        }
        #game-container {
            position: relative;
            width: 1280px; height: 720px;
            background-color: #111;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
            max-width: 100%; max-height: 100vh;
            aspect-ratio: 16/9;
            overflow: hidden;
        }
        
        /* 視覺圖層 */
        .layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: all 0.8s ease;
        }
        #bg-layer { z-index: 1; background-color: #1a1a24; }
        #overlay-layer { z-index: 2; opacity: 0; pointer-events: none; }
        
        /* 視角濾鏡 */
        .mode-noodle #overlay-layer { background: linear-gradient(to bottom, rgba(30,40,50,0.2), rgba(10,15,20,0.6)); opacity: 1; }
        .mode-tingru #overlay-layer { background: radial-gradient(circle, rgba(150,100,50,0.1), rgba(40,10,10,0.5)); opacity: 1; filter: blur(1px); }
        .mode-tech #overlay-layer { background: linear-gradient(to bottom, rgba(0,255,255,0.05), rgba(0,50,150,0.3)); opacity: 1; }
        
        /* 系統提示 Toast */
        #sys-toast {
            position: absolute; top: 20px; right: 140px; /* 避開 Auto 按鈕 */
            background: rgba(0, 150, 255, 0.2); border: 1px solid rgba(0, 150, 255, 0.5);
            padding: 8px 16px; border-radius: 4px; font-size: 14px;
            z-index: 100; opacity: 0; transition: opacity 0.3s;
            pointer-events: none; text-shadow: 0 0 5px rgba(0,200,255,0.8);
        }

        /* Auto 自動播放按鈕 */
        #auto-btn {
            position: absolute; top: 20px; right: 20px;
            background: rgba(20, 20, 25, 0.8); border: 1px solid #666;
            color: #aaa; padding: 8px 20px; border-radius: 4px;
            font-size: 16px; cursor: pointer; z-index: 100;
            transition: 0.3s; letter-spacing: 1px;
        }
        #auto-btn:hover, #auto-btn.active {
            background: rgba(150, 150, 150, 0.2); color: #fff; border-color: #fff;
        }

        /* 對話框：精準計算容納人名+5行對白 (260px)，超過會顯示卷軸 */
        #dialogue-container {
            position: absolute; bottom: 30px; left: 5%;
            width: 90%; height: 260px; 
            background: linear-gradient(135deg, rgba(20,20,25,0.95), rgba(10,10,15,0.95));
            border: 1px solid #444; border-top: 2px solid #666;
            border-radius: 4px; padding: 25px 30px 25px 30px;
            cursor: pointer; z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow-y: auto; scroll-behavior: smooth;
        }
        
        /* 隱藏原生捲軸外觀使其美觀 */
        #dialogue-container::-webkit-scrollbar { width: 6px; }
        #dialogue-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        .mode-tingru #dialogue-container { border-top: 2px solid #E6C280; }
        .mode-tech #dialogue-container { border-top: 2px solid #00E5FF; }

        #speaker-name {
            font-size: 24px; font-weight: bold; color: #A9B7C6;
            margin-bottom: 15px; letter-spacing: 2px;
        }
        .mode-tingru #speaker-name { color: #E6C280; }
        
        #dialogue-text { font-size: 20px; line-height: 1.7; text-shadow: 1px 1px 2px #000; padding-bottom: 15px; }
        
        /* 旁白與動作的傾斜字體設定 */
        #dialogue-text i {
            color: #aaa; font-style: italic;
        }

        /* 閃爍關鍵字 (庭如共感用) */
        .empathy-word { color: #ff5555; text-shadow: 0 0 8px rgba(255,50,50,0.8); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }

        /* 閃爍向下箭頭 */
        #next-indicator {
            position: absolute; right: 25px; bottom: 15px;
            color: #aaa; font-size: 18px;
            animation: blink 1.2s infinite; display: none;
        }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        /* 選項按鈕區 */
        #options-container {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex; flex-direction: column; gap: 15px;
            z-index: 30; width: 65%;
        }
        .option-btn {
            padding: 16px 24px; background-color: rgba(30, 30, 40, 0.95);
            color: #ddd; border: 1px solid #555; border-left: 4px solid #888;
            font-size: 18px; cursor: pointer; border-radius: 2px;
            transition: all 0.2s; text-align: left;
            font-family: inherit; letter-spacing: 1px;
        }
        .option-btn:hover {
            background-color: rgba(60, 60, 75, 0.95); color: #fff;
            border-left: 4px solid #ccc; padding-left: 30px;
        }
        .hidden { display: none !important; }
        
        /* 開始畫面 */
        #title-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; z-index: 50; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 1s;
        }
        #title-screen h1 { font-size: 48px; letter-spacing: 5px; margin-bottom: 20px; font-weight: normal; }
        #title-screen p { color: #888; font-size: 18px; margin-bottom: 50px; letter-spacing: 2px; }
        #start-btn {
            padding: 15px 40px; font-size: 20px; background: transparent; color: #fff;
            border: 1px solid #fff; cursor: pointer; transition: 0.3s;
        }
        #start-btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <div id="game-container" class="mode-noodle">
        <div id="bg-layer" class="layer"></div>
        <div id="overlay-layer" class="layer"></div>
        
        <div id="sys-toast">系統提示</div>
        <button id="auto-btn" onclick="toggleAuto()">Auto: OFF</button>

        <div id="options-container" class="hidden"></div>

        <div id="dialogue-container" onclick="advanceStory()">
            <div id="speaker-name"></div>
            <div id="dialogue-text"></div>
            <div id="next-indicator">▼</div>
        </div>
        
        <div id="title-screen">
            <h1>Before Fadeout</h1>
            <p>最後一場售票演出</p>
            <button id="start-btn" onclick="startGame()">開始執行專案</button>
        </div>
    </div>

<script>
// ==========================================
// 遊戲狀態與數值
// ==========================================
let state = {
    noodle_points: 0,
    tingru_points: 0,
    silence_choice: 0,
    flags: { cctv: false, rundown: false, guest: false }
};

let currentNode = "";
let isTyping = false;
let currentTimeout;
let isAutoMode = false;
let autoAdvanceTimer = null;

// 切換自動播放模式
function toggleAuto() {
    isAutoMode = !isAutoMode;
    const btn = document.getElementById('auto-btn');
    if (isAutoMode) {
        btn.innerText = "Auto: ON";
        btn.classList.add("active");
        // 如果目前不是打字狀態，且有閃爍箭頭，則自動進入下一句
        if (!isTyping && document.getElementById('next-indicator').style.display === 'block') {
            advanceStory();
        }
    } else {
        btn.innerText = "Auto: OFF";
        btn.classList.remove("active");
        clearTimeout(autoAdvanceTimer);
    }
}

// 模擬音效與 BGM 提示
function playSysCue(type, msg) {
    const toast = document.getElementById('sys-toast');
    toast.innerText = `[${type}] ${msg}`;
    toast.style.opacity = 1;
    setTimeout(() => { toast.style.opacity = 0; }, 2000);
}

// ==========================================
// 核心引擎邏輯
// ==========================================
function startGame() {
    document.getElementById('title-screen').style.opacity = 0;
    setTimeout(() => {
        document.getElementById('title-screen').style.display = 'none';
        renderNode("start");
    }, 1000);
}

function renderNode(nodeId) {
    const node = storyData[nodeId];
    if (!node) return;
    
    currentNode = nodeId;

    clearTimeout(autoAdvanceTimer);
    document.getElementById('next-indicator').style.display = 'none';

    if (node.action) node.action();

    if (currentNode !== nodeId) return;

    const container = document.getElementById('game-container');
    container.className = node.mode || container.className;

    if (node.bgm) playSysCue("音樂", node.bgm.replace('BGM: ', ''));
    if (node.sfx) playSysCue("音效", node.sfx.replace('SFX: ', ''));

    document.getElementById('speaker-name').innerText = node.speaker || "";
    
    const optionsBox = document.getElementById('options-container');
    const textBox = document.getElementById('dialogue-text');

    if (node.options && node.options.length > 0) {
        document.getElementById('auto-btn').style.display = 'none'; // 選項時隱藏 Auto
        textBox.innerHTML = node.text || "";
        optionsBox.innerHTML = "";
        node.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = opt.text;
            btn.onclick = (e) => {
                e.stopPropagation();
                playSysCue("系統", "點擊選擇");
                optionsBox.classList.add('hidden');
                renderNode(opt.target);
            };
            optionsBox.appendChild(btn);
        });
        optionsBox.classList.remove('hidden');
    } else {
        document.getElementById('auto-btn').style.display = 'block'; // 恢復 Auto
        optionsBox.classList.add('hidden');
        typeWriterEffect(node.text);
    }
}

function typeWriterEffect(text) {
    text = text || ""; 
    isTyping = true;
    const textBox = document.getElementById('dialogue-text');
    textBox.innerHTML = "";
    
    let i = 0;
    function type() {
        if (i < text.length) {
            if (text.charAt(i) === '<') {
                let closingTagIndex = text.indexOf('>', i);
                if (closingTagIndex !== -1) {
                    i = closingTagIndex + 1;
                } else {
                    i++;
                }
            } else {
                i++;
            }
            
            textBox.innerHTML = text.substring(0, i);
            
            // 每打一個字，自動讓卷軸滾動到最下方
            const container = document.getElementById('dialogue-container');
            container.scrollTop = container.scrollHeight;
            
            currentTimeout = setTimeout(type, 30); 
        } else {
            isTyping = false;
            showNextIndicatorAndAuto();
        }
    }
    type();
}

// 文字顯示完畢後，顯示提示箭頭，並處理自動播放
function showNextIndicatorAndAuto() {
    document.getElementById('next-indicator').style.display = 'block';
    
    // 確保到底部
    const container = document.getElementById('dialogue-container');
    container.scrollTop = container.scrollHeight;
    
    if (isAutoMode) {
        const textLength = document.getElementById('dialogue-text').innerText.length;
        // 根據字數決定等待秒數 (最少 1.5秒)
        let waitTime = Math.max(1500, textLength * 80); 
        autoAdvanceTimer = setTimeout(advanceStory, waitTime);
    }
}

function advanceStory() {
    const node = storyData[currentNode];
    const optionsBox = document.getElementById('options-container');
    
    if (node.options && !optionsBox.classList.contains('hidden') && node.options.length > 0) {
        return;
    }

    if (isTyping) {
        clearTimeout(currentTimeout);
        document.getElementById('dialogue-text').innerHTML = node.text;
        
        // 瞬間顯示全部文字也要滾到底部
        const container = document.getElementById('dialogue-container');
        container.scrollTop = container.scrollHeight;
        
        isTyping = false;
        showNextIndicatorAndAuto();
        return;
    }

    // 推進下一句前，清除之前的計時與箭頭
    clearTimeout(autoAdvanceTimer);
    document.getElementById('next-indicator').style.display = 'none';

    if (node.next) {
        renderNode(node.next);
    }
}
