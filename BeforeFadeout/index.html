<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Before Fadeout Static Web Visual Novel Engine</title>
  <style>
    :root {
      --ui-bg: rgba(8, 10, 14, 0.82);
      --ui-bg-strong: rgba(8, 10, 14, 0.94);
      --ui-border: rgba(255, 255, 255, 0.18);
      --ui-panel: rgba(4, 6, 9, 0.72);
      --text: #f4f1ea;
      --muted: rgba(244, 241, 234, 0.72);
      --accent: #aeb4bd;
      --accent-2: #d8b36a;
      --danger: #df6b6b;
      --speaker-default: #d8b36a;
      --speaker-tingru: #e7b84a;
      --speaker-jami: #82a8ff;
      --speaker-system: #c8c8c8;
      --shadow: rgba(0, 0, 0, 0.55);
      --focus-glow: rgba(180, 188, 200, 0.16);
      --font: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #050609;
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
      user-select: none;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #050609;
      --ui-bg: rgba(8, 10, 14, 0.82);
      --ui-bg-strong: rgba(8, 10, 14, 0.94);
      --ui-border: rgba(255, 255, 255, 0.18);
      --ui-panel: rgba(4, 6, 9, 0.72);
      --accent: #aeb4bd;
      --accent-soft: rgba(174, 180, 189, 0.18);
      --focus-glow: rgba(180, 188, 200, 0.16);
    }

    /*
      UI 焦點色，不等於說話者。
      g / gray / oldnoodle / laomian / kait / lei / system：灰色系
      t / tingru：庭如共感、庭如操作段落，暖黃色
      j / jami / stage：傑米台上表演段，冷藍色
    */
    #game.theme-gray {
      --ui-bg: rgba(9, 11, 15, 0.82);
      --ui-bg-strong: rgba(8, 10, 14, 0.94);
      --ui-border: rgba(205, 213, 224, 0.22);
      --ui-panel: rgba(8, 10, 14, 0.76);
      --accent: #b6bcc6;
      --accent-soft: rgba(182, 188, 198, 0.18);
      --focus-glow: rgba(182, 188, 198, 0.15);
    }

    #game.theme-tingru {
      --ui-bg: rgba(24, 18, 6, 0.82);
      --ui-bg-strong: rgba(30, 22, 7, 0.94);
      --ui-border: rgba(244, 199, 86, 0.34);
      --ui-panel: rgba(33, 24, 8, 0.76);
      --accent: #f1c85f;
      --accent-soft: rgba(241, 200, 95, 0.20);
      --focus-glow: rgba(241, 188, 76, 0.20);
    }

    #game.theme-jami {
      --ui-bg: rgba(5, 12, 28, 0.84);
      --ui-bg-strong: rgba(4, 10, 24, 0.95);
      --ui-border: rgba(108, 160, 255, 0.34);
      --ui-panel: rgba(6, 14, 31, 0.78);
      --accent: #82a8ff;
      --accent-soft: rgba(108, 160, 255, 0.20);
      --focus-glow: rgba(82, 138, 255, 0.22);
    }

    #bgLayer, #spriteLayer, #effectLayer, #uiLayer, #overlayLayer {
      position: absolute;
      inset: 0;
    }

    #bgLayer {
      background: radial-gradient(circle at 50% 30%, #202530 0%, #080a0e 65%, #020305 100%);
      background-size: cover;
      background-position: center;
      transition: opacity 480ms ease, filter 420ms ease, transform 520ms ease;
      z-index: 1;
    }

    #bgLayer::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,0.05), transparent 36%),
        linear-gradient(to bottom, rgba(0,0,0,0.15), rgba(0,0,0,0.58));
      pointer-events: none;
    }

    #game.theme-tingru #bgLayer::after {
      background:
        radial-gradient(circle at 48% 36%, rgba(241,200,95,0.07), transparent 34%),
        linear-gradient(to bottom, rgba(0,0,0,0.10), rgba(23,15,3,0.64));
    }

    #game.theme-jami #bgLayer::after {
      background:
        radial-gradient(circle at 50% 32%, rgba(92,140,255,0.08), transparent 34%),
        linear-gradient(to bottom, rgba(0,0,0,0.12), rgba(3,9,24,0.66));
    }

    #spriteLayer {
      z-index: 2;
      pointer-events: none;
    }

    .sprite {
      position: absolute;
      bottom: 0;
      max-height: 92vh;
      max-width: 48vw;
      object-fit: contain;
      filter: drop-shadow(0 24px 38px rgba(0,0,0,0.58));
      opacity: 0;
      transform: translateY(12px) scale(0.985);
      transition: opacity 360ms ease, transform 360ms ease, filter 360ms ease;
    }

    .sprite.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .sprite.left { left: 6vw; }
    .sprite.center { left: 50%; transform: translateX(-50%) translateY(12px) scale(0.985); }
    .sprite.center.visible { transform: translateX(-50%) translateY(0) scale(1); }
    .sprite.right { right: 6vw; }

    .sprite.dimmed {
      filter: grayscale(0.25) brightness(0.62) drop-shadow(0 24px 38px rgba(0,0,0,0.58));
    }

    #effectLayer {
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    #effectLayer.blackout { background: #000; }

    #flash {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      pointer-events: none;
    }

    #vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 45%, transparent 35%, rgba(0,0,0,0.58) 100%);
      opacity: 0.65;
      pointer-events: none;
    }

    #grain {
      position: absolute;
      inset: 0;
      opacity: 0.13;
      mix-blend-mode: overlay;
      background-image:
        repeating-radial-gradient(circle at 17% 31%, rgba(255,255,255,0.15), rgba(255,255,255,0.15) 1px, transparent 1px, transparent 5px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.06), rgba(255,255,255,0.06) 1px, transparent 1px, transparent 3px);
      pointer-events: none;
      animation: grainMove 950ms steps(2) infinite;
    }

    @keyframes grainMove {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-1%, 1%); }
      50% { transform: translate(1%, -1%); }
      75% { transform: translate(1%, 1%); }
      100% { transform: translate(0, 0); }
    }

    .emotion-word {
      position: absolute;
      padding: 6px 10px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      background: rgba(6, 9, 14, 0.56);
      color: rgba(255, 239, 196, 0.92);
      font-size: clamp(15px, 1.65vw, 25px);
      letter-spacing: 0.12em;
      text-shadow: 0 0 14px rgba(241, 200, 95, 0.85);
      animation: emotionFloat 3.2s ease forwards;
      pointer-events: none;
      white-space: nowrap;
    }

    @keyframes emotionFloat {
      0% { opacity: 0; transform: translateY(12px) scale(0.96); filter: blur(6px); }
      18% { opacity: 1; filter: blur(0); }
      78% { opacity: 0.92; }
      100% { opacity: 0; transform: translateY(-52px) scale(1.06); filter: blur(2px); }
    }

    #uiLayer {
      z-index: 4;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
    }

    #topBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      pointer-events: none;
    }

    #modeBadge {
      min-width: 210px;
      padding: 10px 16px;
      border: 1px solid var(--ui-border);
      border-radius: 999px;
      background: rgba(0,0,0,0.42);
      color: var(--accent);
      font-size: 14px;
      letter-spacing: 0.08em;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 26px var(--focus-glow);
      transition: color 240ms ease, border-color 240ms ease, box-shadow 240ms ease;
    }

    #buttonRow {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .top-btn {
      padding: 8px 10px;
      border: 1px solid var(--ui-border);
      border-radius: 10px;
      color: var(--muted);
      background: rgba(0,0,0,0.36);
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: color 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .top-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.34); }
    .top-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }

    #mainHud {
      display: grid;
      grid-template-columns: minmax(0, 1fr) clamp(340px, 31vw, 460px);
      gap: 18px;
      align-items: end;
      padding: 0 24px 24px;
      pointer-events: none;
    }

    #dialogueBox {
      min-height: 184px;
      padding: 22px 26px 24px;
      border: 1px solid var(--ui-border);
      border-radius: 22px;
      background: linear-gradient(180deg, var(--ui-bg), var(--ui-bg-strong));
      box-shadow: 0 18px 45px var(--shadow), 0 0 34px var(--focus-glow);
      backdrop-filter: blur(12px);
      pointer-events: auto;
      cursor: pointer;
      position: relative;
      transition: background 240ms ease, border-color 240ms ease, box-shadow 240ms ease;
    }

    #speakerName {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      margin-bottom: 12px;
      padding: 5px 15px;
      border-radius: 999px;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.10);
      color: var(--speaker-default);
      font-size: clamp(20px, 1.9vw, 28px);
      font-weight: 850;
      letter-spacing: 0.075em;
      line-height: 1.25;
      text-shadow: 0 2px 12px rgba(0,0,0,0.55);
    }

    #speakerName.oldnoodle,
    #speakerName.laomian,
    #speakerName.kate,
    #speakerName.lei { color: var(--speaker-default); }
    #speakerName.tingru { color: var(--speaker-tingru); }
    #speakerName.jami { color: var(--speaker-jami); }
    #speakerName.system { color: var(--speaker-system); }
    #speakerName.narrator { color: rgba(255,255,255,0.82); }

    #dialogueText {
      min-height: 76px;
      color: var(--text);
      font-size: clamp(18px, 1.85vw, 25px);
      line-height: 1.86;
      letter-spacing: 0.035em;
      white-space: pre-wrap;
      text-shadow: 0 2px 10px rgba(0,0,0,0.55);
    }

    #nextIndicator {
      position: absolute;
      right: 22px;
      bottom: 14px;
      color: var(--accent);
      font-size: 17px;
      animation: blink 900ms ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.3; transform: translateY(0); }
      50% { opacity: 0.95; transform: translateY(3px); }
    }

    #sidePanel {
      min-height: 184px;
      max-height: 36vh;
      padding: 20px 22px;
      border: 1px solid var(--ui-border);
      border-radius: 20px;
      background: var(--ui-panel);
      box-shadow: 0 18px 45px var(--shadow), 0 0 28px var(--focus-glow);
      backdrop-filter: blur(12px);
      pointer-events: auto;
      overflow: hidden;
      transition: background 240ms ease, border-color 240ms ease, box-shadow 240ms ease;
    }

    #sideTitle {
      color: var(--accent);
      font-size: clamp(15px, 1.25vw, 18px);
      font-weight: 800;
      letter-spacing: 0.13em;
      margin-bottom: 12px;
      line-height: 1.35;
    }

    #sideContent {
      color: rgba(255,255,255,0.86);
      font-size: clamp(16px, 1.25vw, 19px);
      line-height: 1.78;
      white-space: pre-wrap;
      max-height: calc(36vh - 74px);
      overflow: auto;
      padding-right: 4px;
    }

    #sideContent::-webkit-scrollbar { width: 8px; }
    #sideContent::-webkit-scrollbar-thumb { background: var(--accent-soft); border-radius: 999px; }

    #choices {
      position: absolute;
      left: 50%;
      bottom: 245px;
      width: min(900px, calc(100vw - 48px));
      transform: translateX(-50%);
      z-index: 5;
      display: none;
      flex-direction: column;
      gap: 12px;
      pointer-events: auto;
    }

    .choice-btn {
      width: 100%;
      padding: 15px 20px;
      border: 1px solid var(--ui-border);
      border-radius: 15px;
      background: rgba(9, 12, 17, 0.88);
      color: var(--text);
      font-size: 18px;
      line-height: 1.58;
      text-align: left;
      cursor: pointer;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.38);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .choice-btn:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      background: var(--ui-bg-strong);
    }

    #overlayLayer {
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(8px);
      pointer-events: auto;
    }

    #overlayCard {
      width: min(760px, calc(100vw - 34px));
      max-height: calc(100vh - 60px);
      overflow: auto;
      padding: 26px;
      border: 1px solid var(--ui-border);
      border-radius: 22px;
      background: rgba(9, 12, 17, 0.96);
      box-shadow: 0 30px 90px rgba(0,0,0,0.7);
    }

    #overlayCard h2 {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 24px;
    }

    #overlayCard p, #overlayCard li {
      color: rgba(255,255,255,0.82);
      line-height: 1.76;
      font-size: 16px;
    }

    #overlayCard code {
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(255,255,255,0.09);
      color: #fff3ce;
    }

    #overlayClose {
      margin-top: 18px;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      cursor: pointer;
    }

    .hidden { display: none !important; }

    .shake { animation: shake 420ms cubic-bezier(.36,.07,.19,.97) both; }

    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }

    .glitch { animation: glitch 520ms steps(2) both; }

    @keyframes glitch {
      0% { filter: hue-rotate(0deg) contrast(1); transform: translate(0,0); }
      20% { filter: hue-rotate(35deg) contrast(1.4); transform: translate(-3px,2px); }
      45% { filter: hue-rotate(-28deg) contrast(1.55); transform: translate(3px,-1px); }
      70% { filter: hue-rotate(12deg) contrast(1.2); transform: translate(-1px,1px); }
      100% { filter: hue-rotate(0deg) contrast(1); transform: translate(0,0); }
    }

    @media (max-width: 980px) {
      #mainHud {
        grid-template-columns: 1fr minmax(300px, 35vw);
        gap: 14px;
        padding: 0 16px 16px;
      }
      #sidePanel { padding: 16px 18px; }
      #sideContent { font-size: 16px; }
    }

    @media (max-width: 820px) {
      #topBar { padding: 10px 12px; }
      #modeBadge { min-width: auto; max-width: 52vw; font-size: 12px; padding: 8px 12px; }
      #buttonRow .top-btn:nth-child(n+5) { display: none; }
      #mainHud {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 0 12px 12px;
      }
      #sidePanel { display: none; }
      #dialogueBox { min-height: 190px; padding: 16px 18px 20px; }
      #speakerName { font-size: 20px; min-height: 31px; margin-bottom: 10px; }
      #dialogueText { font-size: 18px; line-height: 1.78; }
      #choices { bottom: 218px; width: calc(100vw - 24px); }
      .choice-btn { font-size: 16px; padding: 12px 14px; }
      .sprite { max-width: 68vw; }
      .sprite.left { left: -2vw; }
      .sprite.right { right: -2vw; }
    }
  </style>
</head>
<body>
  <div id="game" class="theme-gray">
    <div id="bgLayer"></div>
    <div id="spriteLayer"></div>
    <div id="effectLayer">
      <div id="flash"></div>
      <div id="vignette"></div>
      <div id="grain"></div>
    </div>

    <div id="uiLayer">
      <div id="topBar">
        <div id="modeBadge">SYSTEM / WAITING</div>
        <div id="buttonRow">
          <button class="top-btn" id="btnSave">SAVE</button>
          <button class="top-btn" id="btnLoad">LOAD</button>
          <button class="top-btn" id="btnAuto">AUTO</button>
          <button class="top-btn" id="btnSkip">SKIP</button>
          <button class="top-btn" id="btnLog">LOG</button>
          <button class="top-btn" id="btnHelp">HELP</button>
        </div>
      </div>

      <div id="mainHud">
        <div id="dialogueBox" role="button" aria-label="advance dialogue">
          <div id="speakerName" class="narrator">旁白</div>
          <div id="dialogueText"></div>
          <div id="nextIndicator">▼</div>
        </div>
        <div id="sidePanel">
          <div id="sideTitle">CASE / NOTE</div>
          <div id="sideContent">等待腳本載入……</div>
        </div>
      </div>
    </div>

    <div id="choices"></div>

    <div id="overlayLayer">
      <div id="overlayCard">
        <h2 id="overlayTitle">HELP</h2>
        <div id="overlayBody"></div>
        <button id="overlayClose">關閉</button>
      </div>
    </div>
  </div>

  <script>
    "use strict";

    /***********************************************************************
     * Before Fadeout Static Web Visual Novel Engine
     * ---------------------------------------------------------------------
     * 使用方式：
     * 1. 將本檔命名為 index.html。
     * 2. 建立 data/script.json。
     * 3. 建立 assets/images、assets/bgm、assets/sfx。
     * 4. 上傳整個資料夾到 GitHub Pages、Netlify、Cloudflare Pages 等靜態網頁空間。
     * 5. 玩家打開網址即可遊玩，不需要安裝 Python、Java、Node.js 或任何執行環境。
     *
     * 新增：焦點 UI 指令。
     *   { "type": "ui", "v": "g" }  灰色：老麵、凱特、雷老師、系統旁白等一般焦點
     *   { "type": "ui", "v": "t" }  暖黃色：庭如操作／共感焦點
     *   { "type": "ui", "v": "j" }  冷藍色：傑米台上表演焦點
     * 也可以掛在任一指令上：{ "type": "say", "ui": "t", "speaker": "庭如", "text": "..." }
     ***********************************************************************/

    const CONFIG = {
      scriptPath: "./data/script.json",
      saveKey: "before_fadeout_save_v2",
      textSpeed: 26,
      autoDelayBase: 1200,
      autoDelayPerChar: 38,
      bgmFadeMs: 900,
      defaultBg: "radial-gradient(circle at 50% 30%, #202530 0%, #080a0e 65%, #020305 100%)"
    };

    const $ = (id) => document.getElementById(id);

    const dom = {
      game: $("game"),
      bg: $("bgLayer"),
      sprites: $("spriteLayer"),
      effects: $("effectLayer"),
      flash: $("flash"),
      modeBadge: $("modeBadge"),
      speaker: $("speakerName"),
      text: $("dialogueText"),
      dialogueBox: $("dialogueBox"),
      next: $("nextIndicator"),
      choices: $("choices"),
      sideTitle: $("sideTitle"),
      sideContent: $("sideContent"),
      overlay: $("overlayLayer"),
      overlayTitle: $("overlayTitle"),
      overlayBody: $("overlayBody"),
      overlayClose: $("overlayClose"),
      btnSave: $("btnSave"),
      btnLoad: $("btnLoad"),
      btnAuto: $("btnAuto"),
      btnSkip: $("btnSkip"),
      btnLog: $("btnLog"),
      btnHelp: $("btnHelp")
    };

    const state = {
      script: null,
      sceneId: "start",
      index: 0,
      flags: {},
      log: [],
      busy: false,
      typing: false,
      fullText: "",
      typeTimer: null,
      awaitingChoice: false,
      auto: false,
      skip: false,
      startedAudio: false,
      currentBgmId: null,
      currentMode: "system",
      currentUi: "g",
      continueAfterBusy: false,
      bgmToken: 0,
      sprites: new Map()
    };

    const audio = {
      bgm: new Audio(),
      bgmNext: null,
      ambience: new Audio(),
      sfxPool: []
    };

    audio.bgm.loop = true;
    audio.bgm.volume = 0;
    audio.ambience.loop = true;
    audio.ambience.volume = 0.35;

    const EMPTY_SCRIPT = {
      meta: {
        title: "Before Fadeout Static Web Visual Novel Engine",
        version: "engine-only"
      },
      assets: {
        backgrounds: {},
        characters: {},
        bgm: {},
        ambience: {},
        sfx: {}
      },
      scenes: {
        start: [
          { "type": "ui", "v": "g", "label": "SYSTEM / NO SCRIPT" },
          { "type": "note", "title": "SCRIPT NOT FOUND", "text": "找不到 data/script.json。\n請建立劇情腳本檔案後重新整理頁面。" },
          { "type": "narrate", "text": "找不到 data/script.json。這個 index.html 是純遊戲引擎，不包含正式劇情。" },
          { "type": "end" }
        ]
      }
    };

    async function init() {
      bindEvents();
      state.script = await loadScript();
      validateScene(state.sceneId);
      applyFocusUi("g", "SYSTEM / READY");
      setSideNote("SYSTEM", `腳本載入完成：${state.script.meta?.title || "Untitled"}\n按一下文字框或按 Enter / Space 推進。`);
      await runCurrent();
    }

    async function loadScript() {
      try {
        const res = await fetch(CONFIG.scriptPath, { cache: "no-cache" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } catch (err) {
        console.warn("無法載入 data/script.json。index.html 不內建正式劇情，將顯示缺少腳本提示。", err);
        return EMPTY_SCRIPT;
      }
    }

    function bindEvents() {
      dom.dialogueBox.addEventListener("click", () => advance());
      document.addEventListener("keydown", (e) => {
        if (dom.overlay.style.display === "flex") {
          if (e.key === "Escape" || e.key === "Enter") hideOverlay();
          return;
        }
        if (["Enter", " "].includes(e.key)) {
          e.preventDefault();
          advance();
        }
        if (e.key.toLowerCase() === "s") saveGame();
        if (e.key.toLowerCase() === "l") loadGame();
        if (e.key.toLowerCase() === "a") toggleAuto();
      });

      dom.btnSave.addEventListener("click", saveGame);
      dom.btnLoad.addEventListener("click", loadGame);
      dom.btnAuto.addEventListener("click", toggleAuto);
      dom.btnSkip.addEventListener("click", toggleSkip);
      dom.btnLog.addEventListener("click", showLog);
      dom.btnHelp.addEventListener("click", showHelp);
      dom.overlayClose.addEventListener("click", hideOverlay);
      dom.overlay.addEventListener("click", (e) => { if (e.target === dom.overlay) hideOverlay(); });

      ["click", "keydown", "touchstart"].forEach((eventName) => {
        document.addEventListener(eventName, unlockAudio, { once: true });
      });
    }

    function unlockAudio() {
      state.startedAudio = true;
      [audio.bgm, audio.ambience].forEach(a => {
        a.play().then(() => a.pause()).catch(() => {});
      });
    }

    async function runCurrent() {
      if (state.busy || state.awaitingChoice) return;
      const scene = getScene();
      if (!scene[state.index]) return;
      state.busy = true;
      const cmd = scene[state.index];
      try {
        await execute(cmd);
      } catch (err) {
        console.error("Command error:", cmd, err);
        await showText("系統", `腳本指令執行錯誤：${cmd.type || "unknown"}\n${err.message}`, "system");
      } finally {
        state.busy = false;
        if (state.continueAfterBusy && !state.awaitingChoice && !state.typing) {
          state.continueAfterBusy = false;
          runCurrent();
        }
      }
    }

    async function execute(cmd = {}) {
      if (cmd.ui || cmd.focus) {
        applyFocusUi(cmd.ui || cmd.focus, cmd.label);
      }

      switch (cmd.type) {
        case "say":
          await showText(cmd.speaker || "", cmd.text || "", classifySpeaker(cmd.speaker));
          break;
        case "narrate":
          await showText("旁白", cmd.text || "", "narrator");
          break;
        case "ui":
        case "focus":
          applyFocusUi(cmd.v || cmd.value || cmd.focus || cmd.ui || "g", cmd.label || cmd.l);
          nextCommand();
          break;
        case "mode":
          setMode(cmd.value || cmd.v || "system", cmd.label || cmd.l || cmd.value || cmd.v || "SYSTEM");
          nextCommand();
          break;
        case "bg":
          await setBackground(cmd.id, cmd.transition);
          nextCommand();
          break;
        case "show":
          await showSprite(cmd);
          nextCommand();
          break;
        case "hide":
          await hideSprite(cmd.id);
          nextCommand();
          break;
        case "clearSprites":
          clearSprites();
          nextCommand();
          break;
        case "bgm":
          await playBgm(cmd.id, cmd.volume, cmd.loop, cmd.fade);
          nextCommand();
          break;
        case "stopBgm":
          await fadeOutAudio(audio.bgm, cmd.fade ?? CONFIG.bgmFadeMs);
          audio.bgm.pause();
          state.currentBgmId = null;
          nextCommand();
          break;
        case "ambience":
          await playAmbience(cmd.id, cmd.volume, cmd.loop);
          nextCommand();
          break;
        case "sfx":
          playSfx(cmd.id, cmd.volume);
          nextCommand();
          break;
        case "effect":
          await runEffect(cmd);
          nextCommand();
          break;
        case "wait":
          await wait(cmd.ms || 500);
          nextCommand();
          break;
        case "choice":
          await showChoice(cmd);
          break;
        case "set":
          applySet(cmd.values || cmd.set || {});
          nextCommand();
          break;
        case "jump":
          jumpTo(cmd.next);
          break;
        case "if":
          handleIf(cmd);
          break;
        case "note":
          setSideNote(cmd.title || "NOTE", cmd.text || "");
          nextCommand();
          break;
        case "overlay":
          showOverlay(cmd.title || "INFO", cmd.html || `<p>${escapeHtml(cmd.text || "")}</p>`);
          nextCommand();
          break;
        case "end":
          await endGame();
          break;
        default:
          console.warn("Unknown command:", cmd);
          nextCommand();
      }
    }

    function advance() {
      if (state.awaitingChoice || dom.overlay.style.display === "flex") return;
      unlockAudio();
      if (state.typing) {
        finishTyping();
        return;
      }
      if (!state.busy) nextCommand();
    }

    function nextCommand() {
      state.index += 1;
      if (state.busy) {
        state.continueAfterBusy = true;
        return;
      }
      runCurrent();
    }

    function getScene() {
      validateScene(state.sceneId);
      return state.script.scenes[state.sceneId];
    }

    function validateScene(id) {
      if (!state.script?.scenes?.[id]) throw new Error(`找不到場景：${id}`);
    }

    function jumpTo(sceneId) {
      validateScene(sceneId);
      state.sceneId = sceneId;
      state.index = 0;
      dom.choices.style.display = "none";
      dom.choices.innerHTML = "";
      state.awaitingChoice = false;
      if (state.busy) {
        state.continueAfterBusy = true;
        return;
      }
      runCurrent();
    }

    function handleIf(cmd) {
      const actual = getFlag(cmd.flag);
      const match = ("equals" in cmd) ? actual === cmd.equals : Boolean(actual);
      const target = match ? cmd.then : cmd.else;
      if (target) jumpTo(target);
      else nextCommand();
    }

    function getFlag(path) { return state.flags[path]; }

    function applySet(values) {
      Object.entries(values).forEach(([key, value]) => { state.flags[key] = value; });
    }

    async function showText(speaker, text, className) {
      dom.speaker.textContent = speaker || "旁白";
      dom.speaker.className = className || "narrator";
      dom.text.textContent = "";
      state.fullText = text || "";
      state.typing = true;
      dom.next.style.opacity = "0";

      if (speaker || text) {
        state.log.push({ speaker: speaker || "旁白", text: text || "" });
        if (state.log.length > 100) state.log.shift();
      }

      if (state.skip) {
        finishTyping();
        return;
      }

      let i = 0;
      clearInterval(state.typeTimer);
      state.typeTimer = setInterval(() => {
        i += 1;
        dom.text.textContent = state.fullText.slice(0, i);
        if (i >= state.fullText.length) finishTyping();
      }, CONFIG.textSpeed);
    }

    function finishTyping() {
      clearInterval(state.typeTimer);
      state.typeTimer = null;
      dom.text.textContent = state.fullText;
      state.typing = false;
      dom.next.style.opacity = "1";
      if (state.auto) {
        const delay = CONFIG.autoDelayBase + Math.min(3600, state.fullText.length * CONFIG.autoDelayPerChar);
        setTimeout(() => {
          if (state.auto && !state.typing && !state.awaitingChoice && !state.busy) nextCommand();
        }, delay);
      }
      if (state.skip) {
        setTimeout(() => {
          if (!state.awaitingChoice && !state.busy) nextCommand();
        }, 60);
      }
    }

    function classifySpeaker(speaker) {
      if (!speaker) return "narrator";
      const s = String(speaker).trim().toLowerCase();
      if (["庭如", "tingru"].includes(s)) return "tingru";
      if (["傑米", "jami", "啟業"].includes(s)) return "jami";
      if (["老麵", "老面", "oldnoodle", "laomian"].includes(s)) return "oldnoodle";
      if (["凱特", "kate"].includes(s)) return "kate";
      if (["雷老師", "老師", "lei"].includes(s)) return "lei";
      if (["系統", "system"].includes(s)) return "system";
      return "";
    }

    async function showChoice(cmd) {
      if (cmd.prompt) {
        dom.speaker.textContent = "選擇";
        dom.speaker.className = "system";
        dom.text.textContent = cmd.prompt;
      }
      dom.choices.innerHTML = "";
      state.awaitingChoice = true;
      state.auto = false;
      dom.btnAuto.classList.remove("active");

      (cmd.options || []).forEach((option, idx) => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = option.text || `選項 ${idx + 1}`;
        btn.addEventListener("click", () => {
          playSfx("click", 0.35);
          if (option.ui || option.focus) applyFocusUi(option.ui || option.focus, option.label);
          applySet(option.set || {});
          dom.choices.style.display = "none";
          dom.choices.innerHTML = "";
          state.awaitingChoice = false;
          if (option.next) jumpTo(option.next);
          else nextCommand();
        });
        dom.choices.appendChild(btn);
      });
      dom.choices.style.display = "flex";
    }

    function normalizeFocus(value) {
      const v = String(value || "g").trim().toLowerCase();
      if (["t", "tingru", "warm", "yellow", "empathy"].includes(v)) return "t";
      if (["j", "jami", "stage", "blue", "cool"].includes(v)) return "j";
      return "g";
    }

    function focusLabel(focus) {
      if (focus === "t") return "TINGRU / EMPATHY";
      if (focus === "j") return "JAMI / STAGE";
      return "SYSTEM / CASE";
    }

    function applyFocusUi(value, label) {
      const focus = normalizeFocus(value);
      state.currentUi = focus;
      dom.game.classList.remove("theme-gray", "theme-tingru", "theme-jami");
      if (focus === "t") dom.game.classList.add("theme-tingru");
      else if (focus === "j") dom.game.classList.add("theme-jami");
      else dom.game.classList.add("theme-gray");
      dom.modeBadge.textContent = label || focusLabel(focus);
      dom.modeBadge.dataset.focus = focus;
    }

    function setMode(value, label) {
      state.currentMode = value;
      // 舊 JSON 若使用 mode，也盡量轉成焦點 UI，但不以 speaker 觸發。
      applyFocusUi(value, label || value || "SYSTEM");
      if (normalizeFocus(value) === "t") {
        dom.bg.style.filter = "saturate(0.86) brightness(0.90) contrast(1.05)";
      } else if (normalizeFocus(value) === "j") {
        dom.bg.style.filter = "saturate(0.78) brightness(0.86) contrast(1.10)";
      } else {
        dom.bg.style.filter = "";
      }
    }

    async function setBackground(id, transition = "fade") {
      const bg = state.script.assets?.backgrounds?.[id];
      if (!bg) {
        console.warn("Missing background:", id);
        dom.bg.style.background = CONFIG.defaultBg;
        return;
      }

      if (transition === "flash") await flash(0.78, 200);
      if (transition === "fade") {
        dom.bg.style.opacity = "0";
        await wait(260);
      }

      if (bg.color) dom.bg.style.backgroundImage = bg.color;
      else if (bg.src || typeof bg === "string") {
        const src = bg.src || bg;
        dom.bg.style.backgroundImage = `url("${src}")`;
      }

      dom.bg.style.opacity = "1";
      await wait(120);
    }

    async function showSprite(cmd) {
      const id = cmd.id;
      if (!id) return;
      let img = state.sprites.get(id);
      if (!img) {
        img = document.createElement("img");
        img.className = "sprite";
        img.dataset.spriteId = id;
        dom.sprites.appendChild(img);
        state.sprites.set(id, img);
      }

      const src = resolveCharacterSrc(id, cmd.expression, cmd.src);
      if (src) img.src = src;
      img.className = `sprite ${cmd.position || "center"}`;
      if (cmd.dimmed) img.classList.add("dimmed");
      await wait(30);
      img.classList.add("visible");
      await wait(260);
    }

    async function hideSprite(id) {
      const img = state.sprites.get(id);
      if (!img) return;
      img.classList.remove("visible");
      await wait(260);
      img.remove();
      state.sprites.delete(id);
    }

    function clearSprites() {
      state.sprites.forEach(img => img.remove());
      state.sprites.clear();
    }

    function resolveCharacterSrc(id, expression, directSrc) {
      if (directSrc) return directSrc;
      const chars = state.script.assets?.characters || {};
      const char = chars[id];
      if (!char) return "";
      if (typeof char === "string") return char;
      if (expression && char[expression]) return char[expression];
      if (char.default) return char.default;
      return Object.values(char)[0] || "";
    }

    function safePlay(media) {
      try {
        const promise = media.play();
        if (promise && typeof promise.catch === "function") promise.catch(() => {});
      } catch (_) {}
    }

    async function playBgm(id, volume = 0.45, loop = true, fade = CONFIG.bgmFadeMs) {
      const src = state.script.assets?.bgm?.[id];
      if (!src) {
        console.warn("Missing BGM:", id);
        return;
      }
      if (state.currentBgmId === id && !audio.bgm.paused) return;

      state.currentBgmId = id;
      const token = ++state.bgmToken;
      const old = audio.bgm;
      const next = new Audio(src);
      next.loop = loop !== false;
      next.volume = 0;
      audio.bgmNext = next;

      safePlay(next);

      Promise.all([
        fadeOutAudio(old, fade),
        fadeInAudio(next, volume, fade)
      ]).then(() => {
        if (token !== state.bgmToken) {
          next.pause();
          return;
        }
        old.pause();
        audio.bgm = next;
        audio.bgmNext = null;
      });
    }

    async function playAmbience(id, volume = 0.35, loop = true) {
      const src = state.script.assets?.ambience?.[id];
      if (!src) return;
      audio.ambience.src = src;
      audio.ambience.loop = loop !== false;
      audio.ambience.volume = volume;
      safePlay(audio.ambience);
    }

    function playSfx(id, volume = 0.6) {
      const src = state.script.assets?.sfx?.[id];
      if (!src) return;
      const sfx = new Audio(src);
      sfx.volume = volume;
      audio.sfxPool.push(sfx);
      safePlay(sfx);
      sfx.addEventListener("ended", () => {
        audio.sfxPool = audio.sfxPool.filter(x => x !== sfx);
      });
    }

    function fadeInAudio(a, target, ms) {
      return new Promise((resolve) => {
        const start = performance.now();
        a.volume = 0;
        const tick = (now) => {
          const t = Math.min(1, (now - start) / Math.max(1, ms));
          a.volume = target * t;
          if (t < 1) requestAnimationFrame(tick);
          else resolve();
        };
        requestAnimationFrame(tick);
      });
    }

    function fadeOutAudio(a, ms) {
      return new Promise((resolve) => {
        const startVol = a.volume || 0;
        const start = performance.now();
        const tick = (now) => {
          const t = Math.min(1, (now - start) / Math.max(1, ms));
          a.volume = startVol * (1 - t);
          if (t < 1) requestAnimationFrame(tick);
          else resolve();
        };
        requestAnimationFrame(tick);
      });
    }

    async function runEffect(cmd) {
      switch (cmd.name) {
        case "shake": await shake(cmd.target || "game"); break;
        case "flash": await flash(cmd.opacity ?? 0.85, cmd.ms ?? 260); break;
        case "glitch": await glitch(cmd.target || "bg"); break;
        case "empathy": await empathyWords(cmd.words || []); break;
        case "fadeBlack": await fadeBlack(cmd.ms ?? 700); break;
        case "fadeClear": await fadeClear(cmd.ms ?? 700); break;
        default: console.warn("Unknown effect:", cmd.name);
      }
    }

    async function shake(target) {
      const el = target === "bg" ? dom.bg : dom.game;
      el.classList.remove("shake");
      void el.offsetWidth;
      el.classList.add("shake");
      await wait(450);
      el.classList.remove("shake");
    }

    async function glitch(target) {
      const el = target === "game" ? dom.game : dom.bg;
      el.classList.remove("glitch");
      void el.offsetWidth;
      el.classList.add("glitch");
      await wait(560);
      el.classList.remove("glitch");
    }

    async function flash(opacity = 0.8, ms = 240) {
      dom.flash.style.transition = "none";
      dom.flash.style.background = `rgba(255,255,255,${opacity})`;
      await wait(30);
      dom.flash.style.transition = `background ${ms}ms ease`;
      dom.flash.style.background = "rgba(255,255,255,0)";
      await wait(ms + 40);
    }

    async function fadeBlack(ms = 700) {
      dom.effects.style.transition = `background ${ms}ms ease`;
      dom.effects.style.background = "#000";
      await wait(ms);
    }

    async function fadeClear(ms = 700) {
      dom.effects.style.transition = `background ${ms}ms ease`;
      dom.effects.style.background = "transparent";
      await wait(ms);
    }

    async function empathyWords(words) {
      const list = Array.isArray(words) ? words : String(words || "").split(/[，,\s]+/).filter(Boolean);
      if (!list.length) return;
      list.forEach((word, idx) => {
        const el = document.createElement("div");
        el.className = "emotion-word";
        el.textContent = word;
        el.style.left = `${15 + ((idx * 23) % 66)}vw`;
        el.style.top = `${18 + ((idx * 17) % 46)}vh`;
        el.style.animationDelay = `${idx * 130}ms`;
        dom.effects.appendChild(el);
        setTimeout(() => el.remove(), 3800 + idx * 130);
      });
      await wait(900);
    }

    function setSideNote(title, text) {
      dom.sideTitle.textContent = title || "NOTE";
      dom.sideContent.textContent = text || "";
    }

    function saveGame() {
      const payload = {
        sceneId: state.sceneId,
        index: state.index,
        flags: state.flags,
        log: state.log,
        currentMode: state.currentMode,
        currentUi: state.currentUi,
        savedAt: new Date().toISOString()
      };
      localStorage.setItem(CONFIG.saveKey, JSON.stringify(payload));
      toast("已儲存進度。", "SAVE");
    }

    function loadGame() {
      const raw = localStorage.getItem(CONFIG.saveKey);
      if (!raw) {
        toast("沒有找到儲存資料。", "LOAD");
        return;
      }
      try {
        const payload = JSON.parse(raw);
        state.sceneId = payload.sceneId || "start";
        state.index = payload.index || 0;
        state.flags = payload.flags || {};
        state.log = payload.log || [];
        state.awaitingChoice = false;
        state.busy = false;
        state.typing = false;
        if (payload.currentUi) applyFocusUi(payload.currentUi);
        dom.choices.style.display = "none";
        toast("已讀取進度。", "LOAD");
        runCurrent();
      } catch (err) {
        toast("讀取失敗：儲存資料損毀。", "LOAD");
      }
    }

    function toggleAuto() {
      state.auto = !state.auto;
      if (state.auto) state.skip = false;
      dom.btnAuto.classList.toggle("active", state.auto);
      dom.btnSkip.classList.toggle("active", state.skip);
      toast(state.auto ? "AUTO 已開啟。" : "AUTO 已關閉。", "AUTO");
    }

    function toggleSkip() {
      state.skip = !state.skip;
      if (state.skip) state.auto = false;
      dom.btnSkip.classList.toggle("active", state.skip);
      dom.btnAuto.classList.toggle("active", state.auto);
      toast(state.skip ? "SKIP 已開啟。" : "SKIP 已關閉。", "SKIP");
      if (state.skip && !state.busy && !state.awaitingChoice) nextCommand();
    }

    function showLog() {
      const html = state.log.length
        ? state.log.map(item => `<p><strong>${escapeHtml(item.speaker)}</strong><br>${escapeHtml(item.text)}</p>`).join("")
        : "<p>目前沒有對話紀錄。</p>";
      showOverlay("對話紀錄", html);
    }

    function showHelp() {
      showOverlay("操作說明", `
        <p><strong>滑鼠左鍵 / Enter / Space</strong>：推進文字。文字播放中可直接顯示完整句子。</p>
        <p><strong>S</strong>：儲存。<strong>L</strong>：讀取。<strong>A</strong>：AUTO。</p>
        <p>UI 焦點色不是看誰說話，而是看目前故事焦點。JSON 可用短指令：</p>
        <ul>
          <li><code>{"type":"ui","v":"g"}</code>：灰色，一般案件／老麵／凱特／雷老師／系統旁白。</li>
          <li><code>{"type":"ui","v":"t"}</code>：暖黃色，庭如操作／共感。</li>
          <li><code>{"type":"ui","v":"j"}</code>：冷藍色，傑米台上表演。</li>
        </ul>
        <p>也可以直接掛在任一指令上，例如 <code>{"type":"say","ui":"t","speaker":"庭如","text":"..."}</code>。</p>
        <p>本機測試時不要直接用 <code>file://</code> 開啟，建議用 VS Code Live Server。</p>
      `);
    }

    function toast(text, title = "SYSTEM") { setSideNote(title, text); }

    function showOverlay(title, html) {
      dom.overlayTitle.textContent = title;
      dom.overlayBody.innerHTML = html;
      dom.overlay.style.display = "flex";
    }

    function hideOverlay() { dom.overlay.style.display = "none"; }

    async function endGame() {
      dom.speaker.textContent = "END";
      dom.speaker.className = "system";
      dom.text.textContent = "本段落結束。";
      dom.next.style.opacity = "0";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;")
        .replaceAll("\n", "<br>");
    }

    function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    init().catch((err) => {
      console.error(err);
      setSideNote("SYSTEM ERROR", err.message || String(err));
    });
  </script>
</body>
</html>
